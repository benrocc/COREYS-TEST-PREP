<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0d0d0f;color:#e0e0e0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}#root{max-width:620px;margin:0 auto;padding:12px 12px 32px}button{font-family:inherit;cursor:pointer}button:disabled{opacity:.5}.card{background:#141418;border-radius:12px;padding:14px 12px;border:1px solid #1e1e22}.btn{background:#4F9CF7;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:12px;font-weight:600}.btn2{background:0 0;color:#888;border:1px solid #333;border-radius:8px;padding:9px 16px;font-size:12px;font-weight:600}.back{background:0 0;border:none;color:#888;font-size:12px;padding:4px 0;margin-bottom:3px}.title{text-align:center;font-size:22px;font-weight:800;margin:0 0 3px}.hero{font-size:30px;font-weight:800;background:linear-gradient(135deg,#4F9CF7,#A94FF7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0}.pick{display:flex;align-items:center;gap:9px;padding:11px;background:#141418;border:1px solid #333;border-radius:10px;width:100%}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:14px}.mcard{display:flex;flex-direction:column;align-items:center;gap:4px;padding:18px 10px;background:#141418;border:1px solid;border-radius:12px;text-align:center}.bar-out{height:6px;background:#222;border-radius:3px;overflow:hidden;width:100%}.bar-in{height:100%;border-radius:3px;transition:width .6s}.opt{display:flex;align-items:center;gap:9px;padding:10px 11px;border:1px solid #333;border-radius:8px;width:100%;font-size:13px;text-align:left;line-height:1.4;background:0 0;color:#e0e0e0;transition:all .15s}.prog{height:3px;background:#222;border-radius:2px;margin-bottom:12px;overflow:hidden}.prog-in{height:100%;border-radius:2px;transition:width .3s}.calc{position:fixed;bottom:12px;right:12px;width:220px;background:#1a1a1e;border-radius:14px;padding:10px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:1000;border:1px solid #333}.calc-btn{border-radius:8px;border:none;padding:12px 0;font-size:16px;font-weight:600;color:#fff}.mbar{padding:8px 10px;border-radius:8px;margin-bottom:5px}.sata{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:#F7A94F22;color:#F7A94F;border:1px solid #F7A94F44;margin-bottom:6px}</style></head>

const SN=["Reading","Math","Science","English & Language Usage"],SI={Reading:"\u{1F4D6}",Math:"\u{1F522}",Science:"\u{1F9EC}","English & Language Usage":"\u{270D}\uFE0F"},SC={Reading:"#4F9CF7",Math:"#F7A94F",Science:"#4FCF7F","English & Language Usage":"#A94FF7"},EX={Reading:{q:45,m:55},Math:{q:38,m:57},Science:{q:50,m:60},"English & Language Usage":{q:37,m:37}};
// [secIdx,topic,question,[opts],answer,explanation] or with ,1] for SATA where answer=[]
const QD=[
// READING (0) — Full passage-based, no shortcuts
[0,"Main Idea","Between 2018 and 2023, several large hospital systems implemented mandatory hand hygiene monitoring programs using electronic sensors at sanitizer and soap dispensers. While overall compliance rates improved from 48% to 71%, rates of methicillin-resistant Staphylococcus aureus (MRSA) infections did not significantly decline during the same period. Researchers suggested that compliance alone may be insufficient without concurrent improvements in environmental cleaning protocols. Based on this passage, which statement best captures the main idea?",["Electronic monitoring wastes hospital resources","Improved hand hygiene compliance alone did not reduce MRSA infections, suggesting other factors are involved","MRSA is impossible to prevent in hospitals","Environmental cleaning is more important than handwashing"],1,"The passage shows compliance improved but MRSA didn't decline, pointing to other necessary factors."],
[0,"Main Idea","A longitudinal study tracked 1,200 registered nurses across 15 hospitals over three years. Nurses who participated in structured peer-mentorship programs reported 32% lower burnout scores, 18% fewer sick days, and were 40% more likely to remain at their facility. Hospitals without mentorship programs saw turnover rates nearly double the national average. What is the central argument of this passage?",["Nursing is a stressful career","Peer mentorship programs are associated with reduced burnout and improved nurse retention","Hospitals should pay nurses more","Turnover is caused by poor management alone"],1,"The data connects mentorship specifically to burnout, absences, and retention across multiple measures."],
[0,"Main Idea","Sleep-deprived individuals exhibit reduced reaction times, impaired judgment, and difficulty with complex problem-solving. A 2023 study found that healthcare workers who slept fewer than six hours before a shift made 2.5 times more documentation errors than those who slept seven or more hours. Despite these findings, 62% of nurses surveyed reported regularly sleeping fewer than six hours on workdays. Which best summarizes the passage?",["Nurses need to sleep more","Documentation errors are the biggest problem in healthcare","Sleep deprivation impairs cognitive function in healthcare workers, yet most nurses remain chronically under-rested","All medical errors are caused by tired nurses"],2,"Combines the cognitive effects, the evidence, and the prevalence of the problem."],
[0,"Supporting Details","The American Heart Association recommends that adults engage in at least 150 minutes of moderate-intensity aerobic activity per week. This can include brisk walking, cycling, or swimming. Additionally, muscle-strengthening activities involving all major muscle groups should be performed at least two days per week. Studies show that meeting these guidelines reduces the risk of cardiovascular disease by up to 30%. Which detail from the passage BEST supports the claim that exercise reduces heart disease?",["Adults should exercise 150 minutes weekly","Swimming is a recommended activity","Meeting the guidelines reduces cardiovascular disease risk by up to 30%","Muscle strengthening should be done twice weekly"],2,"The 30% reduction is the specific evidence supporting the disease reduction claim. The other details are recommendations, not evidence."],
[0,"Supporting Details","Central line-associated bloodstream infections (CLABSIs) declined by 46% nationally after hospitals adopted evidence-based insertion bundles. These bundles include five components: hand hygiene before insertion, maximal sterile barrier precautions, chlorhexidine skin antisepsis, optimal catheter site selection (avoiding the femoral vein), and daily review of line necessity with prompt removal when no longer needed. Which represents a supporting detail rather than the main claim?",["CLABSIs declined by 46%","Chlorhexidine skin antisepsis is one bundle component","Evidence-based bundles work","National infection rates changed"],1,"The specific components (like chlorhexidine) support the broader claim about bundles reducing CLABSIs."],
[0,"Supporting Details","Type 2 diabetes now affects approximately 37 million Americans, with prevalence increasing most sharply among adults aged 18-44. Contributing factors include rising obesity rates, increased consumption of processed foods, and declining physical activity levels. The CDC estimates that 96 million American adults have prediabetes, though 80% are unaware of their condition. Which detail best supports the idea that diabetes is a growing public health concern?",["37 million Americans are affected","Processed food consumption has increased","96 million have prediabetes and 80% don't know it","Physical activity is declining"],2,"The massive undiagnosed prediabetes population (96M, 80% unaware) is the most alarming supporting evidence."],
[0,"Following Directions","MEDICATION GUIDE — Metoprolol Succinate ER: Take one tablet by mouth once daily in the morning with or immediately following a meal. Swallow whole; do not crush, chew, or split the tablet. If a dose is missed, take it as soon as you remember unless it is within 8 hours of the next scheduled dose, in which case skip the missed dose. Do not double the dose. Contact your provider if you experience dizziness, unusual fatigue, or heart rate below 50 bpm. A patient normally takes the medication at 8:00 AM. They forgot today's dose and remember at 11:00 PM. What should they do?",["Take the missed dose now since the next dose is more than 8 hours away","Take two tablets tomorrow morning","Skip the missed dose and take tomorrow's dose on schedule","Crush the tablet for faster absorption"],0,"11PM to 8AM = 9 hours. The rule says skip only if within 8 hours of the next dose. Since 9 hours > 8 hours, the patient is NOT in the skip window and should take the missed dose now. Do not crush ER tablets. Never double dose."],
[0,"Following Directions","WOUND CARE INSTRUCTIONS: 1) Wash hands thoroughly with soap and water. 2) Remove old dressing carefully and dispose of it. 3) Clean the wound gently with sterile saline using a gauze pad, wiping from the center outward. 4) Pat dry with a clean gauze pad. 5) Apply a thin layer of prescribed antibiotic ointment. 6) Cover with a new sterile non-adherent dressing and secure with medical tape. 7) Repeat every 12 hours or if the dressing becomes wet or soiled. A patient completed the morning dressing change at 7:30 AM and notices the dressing is dry and intact at 2:00 PM. What should they do?",["Change the dressing immediately since it's been 6.5 hours","Leave the dressing in place until the next scheduled change","Remove the dressing to let the wound air out","Apply more ointment on top of the existing dressing"],1,"The dressing should be changed every 12 hours OR if wet/soiled. It's dry and intact after only 6.5 hours, so the next change is at 7:30 PM."],
[0,"Following Directions","LABORATORY SPECIMEN COLLECTION PROTOCOL: Blood cultures must be collected from two separate venipuncture sites. Clean each site with chlorhexidine using a back-and-forth scrubbing motion for 30 seconds. Allow to air dry completely — do not blow on or fan the site. Collect the anaerobic bottle first, then the aerobic bottle at each site. Label specimens at the bedside with the patient's full name, date of birth, date, time, collector's initials, and the site from which each was drawn. Transport to the laboratory within one hour of collection. A nurse collects blood cultures from the right arm and labels the specimens. They then collect from the left arm. Before transporting, what critical step must occur?",["The specimens from both sites must be mixed together","The left arm specimens must also be labeled at the bedside with site identification","The nurse must wait 30 minutes between collections","The specimens must be refrigerated"],1,"Each specimen must be labeled at the bedside with the specific site. Mislabeling or failure to indicate site defeats the purpose of collecting from two separate sites."],
[0,"Data Interpretation","A hospital tracks patient satisfaction scores quarterly. Q1: 78%, Q2: 82%, Q3: 79%, Q4: 85%. During Q2, the hospital implemented bedside shift reporting. In Q3, they experienced a staffing shortage that lasted through mid-Q4, after which staffing returned to normal levels. Based on this data, which conclusion is MOST supported?",["Bedside reporting definitely improved satisfaction","Satisfaction consistently improved every quarter","Satisfaction dipped during the staffing shortage but recovered once staffing stabilized","The hospital should hire more staff"],2,"Satisfaction rose after the intervention (Q2), dipped during the shortage (Q3), and recovered when staffing normalized (Q4). This is the most data-supported conclusion."],
[0,"Data Interpretation","A research team compiled data on three pain management approaches for post-operative knee replacement patients. Group A (oral medications only): average pain score 6.2/10, average hospital stay 4.1 days. Group B (nerve block + oral medications): average pain score 3.8/10, average hospital stay 2.9 days. Group C (nerve block + IV medications): average pain score 3.5/10, average hospital stay 3.2 days. Which conclusion is best supported by the data?",["Group C had the shortest hospital stay","Nerve blocks combined with oral medications produced both lower pain and shorter stays than oral medications alone","IV medications are always better than oral","Nerve blocks are unnecessary"],1,"Group B had the best combination of lower pain AND shortest stay. Group C had slightly lower pain but longer stay than B."],
[0,"Data Interpretation","A scatter plot displays data from 50 hospitals, with the x-axis showing nurse-to-patient ratio and the y-axis showing 30-day readmission rates. The data points form a general pattern moving from upper-left to lower-right. What relationship does this suggest?",["As nurse-to-patient ratios increase, readmission rates increase","As nurse-to-patient ratios increase, readmission rates tend to decrease","There is no relationship between the variables","Readmission rates are constant regardless of staffing"],1,"Upper-left to lower-right = negative correlation. Higher ratios (more nurses per patient) associated with lower readmissions."],
[0,"Data Interpretation","A pie chart shows the causes of hospital-acquired infections: Catheter-associated UTI 32%, Surgical site infections 22%, Central line bloodstream infections 18%, Ventilator-associated pneumonia 15%, C. difficile 13%. If the hospital experienced 400 total infections last year, approximately how many were related to surgical sites?",["22","64","88","132"],2,"22% of 400 = 88 surgical site infections."],
[0,"Evaluating Arguments","A hospital administrator argues: 'We should switch to 8-hour nursing shifts instead of 12-hour shifts. A study at our facility showed that medication errors increased by 28% during the last four hours of 12-hour shifts compared to the first four hours. Additionally, nurse sick calls are 35% higher the day after a 12-hour shift than after an 8-hour shift.' Which BEST evaluates this argument?",["The argument is weak because it only uses one hospital's data","The argument presents specific quantitative evidence linking shift length to errors and absenteeism","The argument is invalid because nurses prefer 12-hour shifts","The argument fails because it doesn't discuss salary impact"],1,"The argument uses specific, measurable data (28% error increase, 35% more sick calls) from their own facility — that's concrete evidence, even if limited to one site."],
[0,"Evaluating Arguments","An advertisement states: 'NursePrep Pro is the #1 rated TEAS study app — 94% of users passed on their first attempt!' In small print at the bottom, it reads: 'Based on voluntary self-reported survey of 127 users who completed the full program.' What is the MOST significant weakness of this claim?",["The app costs money","127 users is too few for statistical significance","The data is self-reported by users who completed the program, creating selection and response bias","The claim doesn't mention specific TEAS scores"],2,"Self-reported data from completers only: those who quit or failed are less likely to respond, and people may overreport success. This is classic survivorship + response bias."],
[0,"Evaluating Arguments","A researcher publishes: 'Our study of 12,000 patients across 23 hospitals found that early ambulation within 6 hours of surgery reduced post-operative complications by 34% compared to the standard 24-hour bedrest protocol.' A critic responds that 8 of the 23 hospitals also simultaneously changed their pain management protocols. Why does this matter?",["It doesn't matter — the sample size is large enough","Simultaneous protocol changes make it difficult to attribute the improvement solely to early ambulation","Pain management is unrelated to ambulation","The critic is biased against the researcher"],1,"Confounding variable: if pain protocols changed too, the 34% improvement might be partially or wholly due to better pain management, not just early ambulation."],
[0,"Evaluating Arguments","Two studies examine whether vitamin C prevents the common cold. Study A: 15,000 participants, randomized controlled trial, double-blind, published in a peer-reviewed journal — found no significant effect. Study B: 45 participants, no control group, self-reported outcomes, published on a supplement company's website — found a 60% reduction. Which study provides stronger evidence?",["Study B because it showed a larger effect","Study A because of its rigorous methodology, large sample, and lack of commercial bias","Both are equally valid","Neither provides useful information"],1,"Study A has every hallmark of strong evidence: large n, RCT, blinding, peer review, no commercial conflict. Study B has multiple fatal flaws."],
[0,"Comparing Themes","PASSAGE A: During the 1918 influenza pandemic, public health officials in St. Louis implemented aggressive social distancing measures, closing schools and banning public gatherings within two days of the first reported cases. The city's death rate was less than half that of Philadelphia, which delayed similar measures by two weeks. PASSAGE B: In 2020, countries that implemented early travel restrictions and widespread testing during the initial COVID-19 outbreak experienced significantly fewer deaths per capita in the first wave compared to nations that waited to act. What theme connects these passages?",["Pandemics are unavoidable","Early, decisive public health intervention reduces mortality during outbreaks","Social distancing doesn't work","Modern medicine is superior to 1918-era medicine"],1,"Both passages — separated by 100 years — demonstrate that timing of intervention is the critical variable in pandemic outcomes."],
[0,"Comparing Themes","PASSAGE A: A hospital system reduced its central line infection rate from 4.2 to 0.8 per 1,000 line-days by implementing a standardized insertion checklist that empowered any team member to stop the procedure if a step was skipped. PASSAGE B: In aviation, the introduction of pre-flight checklists in the 1930s dramatically reduced crashes caused by pilot error. The key innovation was making the checklist a shared responsibility — any crew member could halt takeoff if an item was missed. These passages share which underlying principle?",["Checklists are simple tools","Standardized protocols with distributed accountability improve safety outcomes across high-risk fields","Aviation and medicine are identical","Only doctors should use checklists"],1,"Both show that checklists work best when anyone can stop the process — distributed accountability is the shared principle."],
[0,"Author's Purpose","The following appeared on a pharmaceutical company's website: 'Living with chronic pain shouldn't mean living without hope. RELIEVA™ has helped over 2 million patients reclaim their active lifestyles with clinically proven, 24-hour pain relief. Talk to your doctor today about whether RELIEVA is right for you. See our full prescribing information including possible side effects at relieva.com/safety.' What is the primary purpose of this passage?",["To objectively inform patients about pain management options","To persuade consumers to ask their doctors about a specific product","To explain the science behind pain relief medication","To warn patients about medication side effects"],1,"Despite informational elements, the call-to-action ('talk to your doctor today') and brand promotion make this persuasive advertising."],
[0,"Author's Purpose","The following appeared in a peer-reviewed nursing journal: 'This systematic review evaluated 34 randomized controlled trials examining the efficacy of aromatherapy for anxiety reduction in hospitalized patients. Lavender inhalation demonstrated a statistically significant reduction in state anxiety scores (p<0.05) in 22 of 34 studies, with a pooled effect size of d=0.42. However, substantial heterogeneity across studies (I²=68%) limits the strength of these conclusions. Further research with standardized protocols is warranted.' What is the author's purpose?",["To sell essential oils to hospitals","To entertain readers with aromatherapy stories","To present and critically evaluate research evidence","To persuade hospitals to adopt aromatherapy immediately"],2,"Academic language, statistical reporting, acknowledgment of limitations, and a call for more research = presenting evidence critically."],
[0,"Inference","During a hospital's quality improvement meeting, the infection control nurse presents data showing that urinary tract infection rates on the surgical floor increased from 1.2 to 3.8 per 1,000 patient-days over six months. During the same period, the hospital switched to a new urinary catheter supplier to reduce costs, and staffing on the surgical floor was reduced by two positions per shift due to budget cuts. Based on this information, which inference is MOST reasonable?",["The new catheters are definitely defective","Either the catheter change, the staffing reduction, or both may have contributed to the increased infection rate","The infection control nurse made an error in data collection","UTI rates naturally fluctuate and this is normal"],1,"Two changes occurred simultaneously. Either could be the cause, or both. A reasonable inference considers all plausible explanations without assuming one."],
[0,"Inference","A patient's medical record contains the following sequence of orders: Day 1 — IV antibiotics started. Day 3 — oral antibiotics ordered, IV discontinued. Day 4 — physical therapy consult ordered, ambulation protocol initiated. Day 5 — dietary consult for regular diet, discharge planning referral. What can be inferred about this patient's trajectory?",["The patient's condition is deteriorating","The patient is being transferred to ICU","The patient is improving and being prepared for discharge","The patient refused treatment"],2,"The progression from IV→oral meds, starting PT/ambulation, regular diet, and discharge planning all indicate improvement and preparation to go home."],
[0,"Inference","A research article reports that a new rapid flu test has a sensitivity of 92% and a specificity of 88%. In a population where 15% actually have the flu, the test was positive for a patient. What can be inferred?",["The patient definitely has the flu","A positive result is very likely correct given high sensitivity","Because only 15% of the population is actually infected, there is a meaningful chance this is a false positive despite high sensitivity","The test is unreliable"],2,"When disease prevalence is low (15%), even tests with good sensitivity/specificity produce a notable proportion of false positives. This is a key concept in diagnostic reasoning."],
[0,"Context Clues","The cardiologist noted that the patient's ejection fraction had dropped to 25%, indicating severe systolic dysfunction. A normal ejection fraction ranges from 55% to 70%, meaning the heart typically pumps out more than half the blood in the ventricle with each contraction. The declining ejection fraction, combined with the patient's increasing shortness of breath and peripheral edema, painted a concerning clinical picture. Based on the passage, 'ejection fraction' most likely refers to:",["The percentage of blood pumped out of the heart with each beat","The patient's heart rate","The amount of oxygen in the blood","The speed of blood flow through arteries"],0,"The passage defines it as how much blood the ventricle pumps out per contraction, with 55-70% being normal and 25% being severely reduced."],
[0,"Context Clues","After reviewing the MRI results, the neurologist explained that the patient's symptoms were likely caused by demyelination — a process in which the protective myelin sheath surrounding nerve fibers deteriorates, disrupting the transmission of electrical signals between the brain and the body. This pattern is characteristic of multiple sclerosis. In this passage, 'demyelination' refers to:",["Nerve fiber growth","Deterioration of the protective covering around nerves","Increased nerve signal speed","Formation of new neural pathways"],1,"The passage explicitly defines it as deterioration of the myelin sheath, which disrupts signal transmission."],
[0,"Context Clues","The geriatric assessment revealed significant sarcopenia in the 82-year-old patient. Her grip strength measured in the lowest fifth percentile for her age group, she struggled to rise from a chair without using her arms, and her gait speed had slowed considerably over the past year. The physical therapist recommended a progressive resistance training program. Based on context, 'sarcopenia' most likely involves:",["Memory loss associated with aging","Age-related loss of muscle mass and strength","A skin condition common in elderly patients","Deterioration of hearing ability"],1,"All the clues — low grip strength, difficulty standing, slow gait — point to muscle weakness and loss. The resistance training recommendation confirms this."],
[0,"Fact vs Opinion","Read the following statements from a hospital's annual report: I) 'Patient satisfaction scores increased from 72% to 84% over the fiscal year.' II) 'We believe our hospital provides the most compassionate care in the region.' III) 'A total of 12,847 surgical procedures were performed.' IV) 'The new wing should have been completed before the emergency department expansion.' Which statements are FACTS?",["I and II","II and IV","I and III","I, III, and IV"],2,"Statement I (specific scores) and III (specific number of procedures) are verifiable. II ('most compassionate') is subjective opinion. IV ('should have been') is a value judgment."],
[0,"Fact vs Opinion","A nursing journal article states: 'The 12-hour shift model, while popular with nurses who prefer fewer workdays, is arguably the most significant contributor to medication errors in acute care settings. According to the Agency for Healthcare Research and Quality, error rates increase by 28% after the tenth hour of a shift.' Which portion is OPINION?",["Error rates increase by 28% after the tenth hour","The 12-hour shift model is popular with some nurses","12-hour shifts are arguably the most significant contributor to medication errors","The AHRQ provided data on error rates"],2,"'Arguably the most significant contributor' is a judgment — other factors may contribute more. The 28% statistic and popularity observation are verifiable claims."],
[0,"Text Structure","Nurses in the emergency department reported increasing frustration with the electronic health record system. Documentation took an average of 45 minutes per patient, nearly double the time spent on the previous system. In response, the IT department developed customizable documentation templates specific to common ED chief complaints. Three months after implementation, average documentation time decreased to 22 minutes per patient, and nurse satisfaction scores improved by 18 points. This passage is BEST described as which organizational structure?",["Chronological sequence","Compare and contrast","Cause and effect","Problem and solution"],3,"Problem (slow documentation causing frustration) → solution (customizable templates) → outcome (faster documentation, improved satisfaction)."],
[0,"Text Structure","Both nurse practitioners and physician assistants can prescribe medications, order diagnostic tests, and manage patient care. However, NPs follow a nursing model that emphasizes holistic, patient-centered care and health promotion, while PAs follow a medical model focused on disease diagnosis and treatment. NPs must specialize in a population focus during their education, whereas PAs are trained as generalists who can work across specialties. Despite these differences, both professions address the growing shortage of primary care providers. This passage uses which organizational structure?",["Chronological sequence","Compare and contrast","Problem and solution","Cause and effect"],1,"The passage systematically compares NPs and PAs across multiple dimensions: model, education, and scope, while noting similarities."],
[0,"Text Structure","In January, the hospital board approved funding for a patient safety initiative. By March, a multidisciplinary committee had developed new fall prevention protocols. Staff training was completed during April and May. The protocols were implemented hospital-wide in June, and by September, fall rates had decreased by 31% compared to the same period the previous year. Which structure organizes this passage?",["Compare and contrast","Problem and solution","Chronological/sequential","Cause and effect"],2,"The passage traces events in time order: January→March→April/May→June→September."],
[0,"Logical Conclusion","A clinical practice guideline states that patients with a documented severe allergic reaction to a medication should never be re-exposed to that medication or others in the same drug class. A patient's chart indicates a history of anaphylaxis following administration of penicillin. The physician orders cephalexin (a first-generation cephalosporin). Research shows an approximately 1-2% cross-reactivity between penicillins and first-generation cephalosporins in patients with penicillin allergy. Which conclusion is MOST appropriate?",["Administer cephalexin since it's a different drug class entirely","The order requires clarification with the prescriber given the cross-reactivity risk","The patient will definitely have a reaction to cephalexin","Penicillin allergies don't affect other antibiotics"],1,"There IS a small but documented cross-reactivity risk. The guideline says avoid the same class — cephalosporins are a different class but share a beta-lactam ring. This requires clinical judgment and clarification, not automatic administration or refusal."],
[0,"Logical Conclusion","A public health study finds that counties with fluoridated water have 25% fewer dental cavities in children compared to counties without fluoridation, after controlling for income, diet, and access to dental care. Which conclusion is BEST supported?",["Fluoridated water completely prevents cavities","Water fluoridation is associated with reduced childhood cavities independent of other factors","Children in fluoridated counties never need dental care","Non-fluoridated counties should be fined"],1,"The study controlled for confounders and found a 25% reduction. 'Associated with reduced cavities' is appropriate — not 'prevents' or 'eliminates.'"],
[0,"Tone","'While the committee acknowledges the fiscal constraints facing the department, the systematic erosion of nursing positions — now totaling 47 FTEs over three budget cycles — has created conditions that are fundamentally incompatible with safe patient care. We urge immediate action before a preventable tragedy forces the conversation we should be having now.' The tone of this passage is best described as:",["Indifferent","Urgent and critical, with controlled professionalism","Casually conversational","Optimistic about the future"],1,"The language is measured but firm: 'systematic erosion,' 'fundamentally incompatible,' 'preventable tragedy.' It's critical and urgent while maintaining professional register — not casual or emotional."],
[0,"Tone","'Initial results from the Phase II trial are encouraging, with a 15% improvement in progression-free survival compared to the current standard of care. However, the study's limited sample size of 89 participants and relatively short follow-up period of 14 months necessitate cautious interpretation. A larger Phase III trial is currently being designed.' The tone is best described as:",["Dismissive of the findings","Overly enthusiastic","Cautiously optimistic with scientific restraint","Pessimistic about the drug's potential"],2,"'Encouraging' shows optimism, but 'limited sample,' 'short follow-up,' and 'cautious interpretation' show restraint. This is textbook scientific communication."],
[0,"Primary Source","A nursing student is writing a research paper on the effectiveness of hourly rounding in reducing patient falls. Which source would provide the STRONGEST primary evidence?",["A nursing textbook chapter explaining fall prevention strategies","A meta-analysis summarizing 20 studies on hourly rounding","A published randomized controlled trial comparing fall rates between units with and without hourly rounding","A hospital administrator's blog post about their fall reduction program"],2,"An original RCT provides primary, firsthand experimental evidence. The meta-analysis (choice B) would be strong secondary evidence. The textbook is tertiary. The blog is anecdotal."],
[0,"Schedule Reading","CLINIC SCHEDULE — Dr. Patel: Mon/Wed/Fri 8AM-4PM. Dr. Chen: Tue/Thu 9AM-5PM, Sat 9AM-12PM. Lab Services: Mon-Fri 7AM-3PM only. X-Ray: Mon-Fri 8AM-5PM, Sat 9AM-1PM. All providers closed Sunday. A patient needs to see Dr. Chen AND get lab work done on the same day. Which day works?",["Monday","Tuesday","Saturday","Sunday"],1,"Dr. Chen works Tue/Thu/Sat. Lab is Mon-Fri only. Tuesday and Thursday overlap — Tuesday is the first available option listed."],
[0,"Schedule Reading","MEDICATION ADMINISTRATION SCHEDULE — Room 301: Metformin 500mg at 0800 and 1800 with meals. Atorvastatin 20mg at 2100. Lisinopril 10mg at 0900. Room 302: Aspirin 81mg at 0800. Metoprolol 25mg at 0800 and 2000. Furosemide 40mg at 0800. At 0800, how many TOTAL medications need to be administered between both rooms?",["3","4","5","6"],1,"Room 301 at 0800: Metformin (1). Room 302 at 0800: Aspirin + Metoprolol + Furosemide (3). Total = 4."],
[0,"Schedule Reading","HOSPITAL DIRECTORY — Emergency Dept: Ground Floor, West Wing. Radiology: 1st Floor, East Wing. Laboratory: 1st Floor, West Wing. Pharmacy: 2nd Floor, East Wing. Cardiology: 3rd Floor, West Wing. Neurology: 3rd Floor, East Wing. Cafeteria: Ground Floor, East Wing. A visitor is in the cafeteria and needs to reach Cardiology. They need to go:",["Down one floor, same wing","Up three floors, opposite wing","Up three floors, same wing","Same floor, opposite wing"],1,"Cafeteria: Ground East. Cardiology: 3rd West. That's up three floors and from East to West (opposite wing)."],
[0,"Following Directions","POST-OPERATIVE CARE INSTRUCTIONS — Total Knee Replacement: Keep the surgical leg elevated on two pillows when resting. Apply ice packs for 20 minutes on, 20 minutes off, during waking hours for the first 72 hours. Begin prescribed physical therapy exercises on post-operative day 1. Take pain medication 30 minutes BEFORE physical therapy sessions. Do not drive until cleared by your surgeon. Do not submerge the incision in water for 3 weeks. Report fever above 101.5°F, increasing redness or swelling around the incision, or drainage with foul odor. A patient's surgery was at 10 AM on Monday. When should they start physical therapy exercises?",["Monday afternoon","Tuesday (post-op day 1)","After the 72-hour ice period ends","When they feel ready"],1,"Post-op day 1 = the day after surgery. Surgery Monday = PT starts Tuesday."],
[0,"Data Interpretation","A table shows nurse-to-patient ratios and fall rates across five units: ICU 1:2 ratio, 0.3 falls per 1000 patient-days. Med-Surg 1:5 ratio, 2.1 falls. Telemetry 1:4, 1.4 falls. Oncology 1:5, 2.4 falls. Rehab 1:6, 3.8 falls. Based SOLELY on this data, which statement is MOST supported?",["Better staffing ratios cause fewer falls","Units with lower nurse-to-patient ratios tend to have lower fall rates","ICU patients never fall","Oncology patients are the most at risk"],1,"The data shows a trend (lower ratios = fewer falls) but correlation isn't causation, so 'tend to have' is most accurate."],
[0,"Data Interpretation","A line graph tracks a hospital's CLABSI rate over 12 months. Months 1-4: rate fluctuates between 3.0-3.5. Month 5: a new insertion bundle protocol is implemented. Months 6-8: rate drops to 1.5-2.0. Months 9-10: rate rises to 2.5. Months 11-12: additional staff education is provided, rate drops to 1.0. Which interpretation is MOST accurate?",["The bundle had no lasting effect","The initial improvement was not sustained without reinforcement through ongoing education","The rate would have decreased without any intervention","Staff education alone would have been sufficient"],1,"The data shows improvement with the bundle, backsliding without reinforcement, then further improvement with education — suggesting both are needed."],
[0,"Evaluating Arguments","A nurse manager argues against mandatory overtime: 'In the past 6 months, 73% of medication errors on our unit occurred during shifts that extended beyond 12 hours. Additionally, our unit's nurse turnover rate has increased from 12% to 31% since mandatory overtime was implemented, costing an estimated $1.2 million in recruitment and training. Comparable units that eliminated mandatory OT saw turnover rates below 15%.' How would you evaluate this argument?",["It relies entirely on emotional appeal","It uses unit-specific data, financial evidence, and comparative benchmarks to build a strong evidence-based case","It's weak because it only discusses one unit","The turnover data is irrelevant to the overtime question"],1,"The argument combines multiple types of evidence: error data, financial impact, and comparison to similar units. It's a strong, multi-faceted case."],
[0,"Comparing Themes","PASSAGE A: A systematic review found that patients who received culturally competent care — including language-appropriate materials, interpreter services, and providers trained in cultural humility — showed higher medication adherence rates and fewer emergency department visits. PASSAGE B: A rural health initiative partnered with community health workers from local indigenous communities to deliver diabetes education using traditional storytelling methods. HbA1c levels improved by an average of 1.2 points over 12 months. The underlying principle shared by both passages is:",["Western medicine is superior","One-size-fits-all approaches are most efficient","Adapting healthcare delivery to patients' cultural contexts improves outcomes","Only indigenous methods should be used for indigenous patients"],2,"Both show that cultural adaptation — whether through interpreter services or community storytelling — leads to measurable improvements in health outcomes."],
[0,"Author's Purpose","'Note to Staff: Effective immediately, all medication administration requires two-nurse verification for high-alert medications (insulin, heparin, chemotherapy agents, and opioids). Both nurses must independently verify the patient's identity, the medication, the dose, the route, and the time before administration. This policy change follows two recent near-miss events involving insulin dosing. Your compliance is essential for patient safety. Questions? Contact the Clinical Nurse Educator.' The purpose of this passage is:",["To entertain staff with a story about medication errors","To persuade staff that high-alert medications are dangerous","To inform and direct staff about a new mandatory safety policy","To compare different medication verification methods"],2,"This is a directive memo: it states a new policy, explains the rationale, lists requirements, and provides a contact. It's informational and directive."],
[0,"Inference","A hospital's annual report includes the following: 'This year, we invested $4.2 million in electronic health record upgrades, $2.8 million in telehealth infrastructure, and $1.5 million in AI-assisted diagnostic tools. Our patient portal now has 78,000 active users, up from 12,000 three years ago.' You can most reasonably infer that this hospital:",["Is going bankrupt from technology spending","Is prioritizing digital health transformation and patients are increasingly engaging with it","Plans to replace all physicians with AI","Has the best technology in the country"],1,"Heavy technology investment + massive patient portal growth = strategic digital focus with patient adoption. The other conclusions are unsupported exaggerations."],
[0,"Inference","The charge nurse assigns a newly graduated RN to care for a stable post-operative patient who had an uncomplicated appendectomy, while assigning a nurse with 15 years of ICU experience to a patient in septic shock on multiple vasopressors. What can be inferred about the charge nurse's decision?",["The charge nurse is being unfair to the new graduate","Patient assignments are made based on matching nurse experience with patient acuity","The experienced nurse is being punished with a harder patient","The new nurse isn't capable of caring for sick patients"],1,"Matching the complex, unstable patient with the experienced nurse and the stable patient with the new grad = acuity-based assignment. This is standard practice."],
[0,"Context Clues","The patient presented with significant ascites — her abdomen was visibly distended, and shifting dullness was detected on percussion. Paracentesis was performed, and 3.2 liters of straw-colored fluid were drained from the peritoneal cavity. She reported immediate relief of pressure and dyspnea following the procedure. Based on context, 'ascites' refers to:",["Abdominal pain","Abnormal accumulation of fluid in the abdominal cavity","Intestinal obstruction","Abdominal muscle weakness"],1,"Distended abdomen, fluid drained from peritoneal cavity, 3.2 liters removed = fluid accumulation in the abdomen."],
[0,"Context Clues","Following cardiac catheterization, the nurse monitored the patient's right femoral access site for signs of hematoma formation — specifically watching for increasing swelling, firmness, or ecchymosis around the puncture site. The patient's pedal pulses were assessed every 15 minutes to ensure adequate distal perfusion. In this passage, 'ecchymosis' most likely refers to:",["A blood clot in the heart","Bruising or discoloration from blood leaking into tissue","An infection at the catheter site","Numbness in the extremity"],1,"Listed alongside swelling and firmness as signs of hematoma = blood-related. Context of bleeding risk at access site + 'discoloration' makes bruising the most logical meaning."],
[0,"Logical Conclusion","A randomized controlled trial with 8,500 participants found that patients who received daily low-dose aspirin had a 22% reduction in first-time cardiovascular events compared to placebo. However, the aspirin group also had a 38% increase in gastrointestinal bleeding events. The study authors concluded that the risk-benefit ratio must be individually assessed. Based on this data, which conclusion is MOST valid?",["Everyone should take daily aspirin","Aspirin should never be prescribed","Aspirin reduces cardiovascular risk but increases bleeding risk, requiring individualized clinical decision-making","The study results are contradictory and therefore invalid"],2,"The data supports BOTH a benefit (CV reduction) and a risk (GI bleeding). Individualized assessment acknowledges this complexity."],
[0,"Logical Conclusion","A nursing home implements a new falls prevention protocol that includes hourly rounding, non-slip footwear, bed alarms, and medication review. After 6 months, falls decreased by 42%. However, the facility also hired 8 additional staff members at the same time the protocol was implemented. Which conclusion is MOST accurate?",["The protocol alone caused the 42% reduction","The additional staff alone caused the improvement","The improvement is likely due to the combined effect of the protocol and increased staffing, though individual contributions cannot be determined","Falls would have decreased without any changes"],2,"Two interventions occurred simultaneously. Without isolating variables, attributing the outcome to one factor alone is not valid."],
[0,"Fact vs Opinion","Read the following excerpt from a hospital newsletter: 'Last quarter, our surgical department performed 847 procedures with a 0.4% complication rate, well below the national average of 1.2%. Chief of Surgery Dr. Martinez stated that this makes our surgical team the finest in the tristate area. The hospital board has approved $3.5 million for a new operating suite to be completed by Q4.' Which statement from the passage is an OPINION?",["847 procedures were performed","The complication rate was 0.4%","Our surgical team is the finest in the tristate area","$3.5 million was approved for a new suite"],2,"'Finest in the tristate area' is a subjective superlative that cannot be objectively verified, even though it's attributed to a credible source. Stats and budget approvals are verifiable facts."],
[0,"Tone","'We recognize that the transition to a new charting system will require patience and a willingness to adapt from our entire team. While the learning curve may feel steep initially, the long-term benefits — including reduced documentation time, fewer transcription errors, and improved interdepartmental communication — will be well worth the effort. Training sessions are available throughout the month, and the IT support team will be stationed on each unit during the first two weeks of go-live.' The tone of this passage is:",["Threatening and demanding","Dismissive of staff concerns","Encouraging and supportive while acknowledging challenges","Overly critical of current practices"],2,"Acknowledges difficulty ('patience,' 'steep learning curve') while emphasizing benefits and offering support = encouraging and empathetic."],
[0,"Primary Source","A nursing researcher wants to understand the lived experience of nurses who worked during the COVID-19 pandemic. Which would be the STRONGEST primary source?",["A newspaper article about nurse burnout during COVID","A textbook chapter on pandemic nursing","In-depth interview transcripts from nurses who worked COVID units","A government report summarizing pandemic staffing statistics"],2,"Interview transcripts from the nurses themselves capture their firsthand lived experience — the direct data the researcher needs."],
[0,"Text Structure","The 2023 National Patient Safety Goals emphasized reducing harm from clinical alarm fatigue. Excessive non-actionable alarms — often exceeding 350 per patient per day in ICUs — lead nurses to disable, silence, or ignore alerts, potentially missing critical notifications. To address this, hospitals are customizing alarm parameters to individual patients, eliminating redundant alerts, and training staff on appropriate alarm management. Early adopters report a 55% reduction in non-actionable alarms and a 23% increase in response time to critical alerts. What organizational structure does this passage follow?",["Chronological","Compare/contrast","Cause and effect","Problem-solution"],3,"Problem: alarm fatigue from excessive alerts. Solution: customization, elimination, training. Result: fewer non-actionable alarms, better response time."],
