[2,"Urinary System","If ADH drops, urine output will:",["Decrease","Increase","Stay same","Stop"],1,"Less ADH=less reabsorption=more dilute urine."],
[2,"Urinary System","Glomerulus filters based on:",["Molecule size and pressure","Blood color","Temperature","Hormones only"],0,"Pressure-driven; small molecules pass, large stay."],
[2,"Immune System","Innate vs adaptive immunity:",["Innate specific, adaptive general","Innate first-line non-specific, adaptive targets specific pathogens","They're the same","Innate uses antibodies, adaptive uses skin"],1,"Innate=immediate/nonspecific. Adaptive=slower/specific."],
[2,"Immune System","Memory B cells allow:",["Direct bacterial destruction","Faster antibody production on re-exposure","RBC production","Lymph filtration"],1,"Memory cells enable rapid secondary immune response."],
[2,"Musculoskeletal","Smooth muscle differs from skeletal because smooth is:",["Voluntary and striated","Involuntary and non-striated","Voluntary and non-striated","Only in heart"],1,"Smooth: involuntary, non-striated, in organs/vessels."],
[2,"Musculoskeletal","Osteoclasts:",["Build bone","Break down bone for remodeling","Carry oxygen","Fight infection"],1,"Osteoclasts resorb bone. Osteoblasts build."],
[2,"Skeletal System","Axial skeleton includes:",["Arms and legs","Skull, vertebral column, rib cage","Only skull","Pelvis and femur"],1,"Axial=central. Appendicular=limbs."],
[2,"Integumentary System","Second-degree burn damage extends to:",["Epidermis only","Epidermis and partial dermis","All layers including subcutaneous","Muscle and bone"],1,"1st=epidermis. 2nd=epidermis+partial dermis (blisters). 3rd=full thickness."],
[2,"Reproductive System","Menstrual cycle regulated primarily by:",["Thyroid","Estrogen/progesterone from ovaries, FSH/LH from pituitary","Adrenal glands","Testosterone"],1,"HPO axis: pituitary→ovaries in feedback loop."],
[2,"Reproductive System","Spermatogenesis occurs in:",["Prostate","Epididymis","Seminiferous tubules of testes","Vas deferens"],2,"Produced in tubules, mature in epididymis."],
[2,"Scientific Reasoning","Coffee drinkers have lower depression rates. Valid limitation?",["Coffee tastes good","Correlation ≠ causation","Depression is serious","Everyone should drink coffee"],1,"Observational data can't prove causation."],
[2,"Scientific Reasoning","Which should remain constant in an experiment?",["Independent variable","Dependent variable","Controlled variables","Hypothesis"],2,"Control variables kept constant so only IV affects outcome."],
[2,"Chemistry","Noble gases (Group 18) are unreactive because:",["No electrons","Outer shell is full","They're metals","No protons"],1,"Full valence shell=stable=no bonding needed."],
[2,"Chemistry","In a solution, the solvent is:",["Smaller amount","Being dissolved","Greater amount that does the dissolving","Always solid"],2,"Solvent=greater amount, dissolves. Solute=lesser, dissolved."],// ENGLISH & LANGUAGE USAGE (3) — Contextual, no giveaways
[3,"Semicolons & Colons","Read the following sentence: 'The patient exhibited three concerning symptoms___ persistent headache, blurred vision, and elevated blood pressure.' Which punctuation correctly fills the blank?",["a semicolon (;)","a colon (:)","a comma (,)","no punctuation needed"],1,"A colon introduces a list that follows a complete independent clause."],
[3,"Semicolons & Colons","A nursing student writes: 'The procedure was completed without complications; however, the patient required additional monitoring overnight.' Is this punctuation correct?",["No — a comma should replace the semicolon","Yes — a semicolon correctly precedes 'however' between two independent clauses","No — a colon should replace the semicolon","No — 'however' should be removed"],1,"When a conjunctive adverb (however, therefore, meanwhile) joins two independent clauses, a semicolon precedes it and a comma follows it."],
[3,"Semicolons & Colons","Which sentence uses a colon INCORRECTLY?",["The lab report included: CBC, BMP, and urinalysis.","The nurse noted the following vital signs: BP 120/80, HR 72, RR 16.","The diagnosis was clear: the patient had pneumonia.","Remember: hand hygiene saves lives."],0,"'The lab report included' is not a complete clause without its object — a colon should not interrupt a verb and its direct object."],
[3,"Semicolons & Colons","A nurse charts: 'The patient tolerated the procedure well___ there were no adverse reactions noted during the observation period.' The BEST punctuation for the blank is:",["a comma","a semicolon","a colon","a dash"],1,"Two closely related independent clauses with no conjunction → semicolon. A comma alone would create a splice."],
[3,"Semicolons & Colons","Choose the correctly punctuated sentence:",["The hospital serves three counties; Wayne, Oakland, and Macomb.","The hospital serves three counties: Wayne, Oakland, and Macomb.","The hospital serves three counties, Wayne, Oakland, and Macomb.","The hospital, serves three counties: Wayne, Oakland, and Macomb."],1,"Complete clause + list = colon. A semicolon before a simple list is incorrect (choice A). A comma creates ambiguity (choice C)."],
[3,"Subject-Verb Agreement","In the sentence 'The number of medication errors reported on the night shift ___ decreased since implementing barcode scanning,' which verb correctly fills the blank?",["have","has","are","were"],1,"'The number of' is a singular expression → 'has.' This is different from 'a number of' which is plural."],
[3,"Subject-Verb Agreement","Select the sentence with CORRECT subject-verb agreement:",["Neither the physician nor the nurses was available for the code.","Neither the physician nor the nurses were available for the code.","Neither the physician nor the nurses is available for the code.","Neither the physician nor the nurses has been available for the code."],1,"With 'neither...nor,' the verb agrees with the nearer subject. 'Nurses' (plural) is nearer → 'were.'"],
[3,"Subject-Verb Agreement","A student writes: 'Every nurse, doctor, and technician are required to complete the annual safety training.' What is the error?",["'Every' is unnecessary","'Are' should be 'is' because 'every' makes compound subjects singular","There is no error","'Required' should be 'requiring'"],1,"'Every' before a compound subject makes it grammatically singular → 'is required.'"],
[3,"Subject-Verb Agreement","Which sentence contains a subject-verb agreement error?",["The committee has reached its decision regarding the policy change.","The data from the clinical trials suggest a positive outcome.","A group of researchers are publishing their findings next month.","Each of the patients has been assessed by the attending physician."],2,"'Group' is a collective noun (singular) → 'is publishing.' Choices A and D correctly use singular verbs with collective/singular subjects. Choice B correctly treats 'data' as plural."],
[3,"Subject-Verb Agreement","In the sentence 'A significant number of patients admitted this week ___ tested positive for influenza,' the correct verb is:",["has","have","is","was"],1,"'A number of' functions as a plural expression meaning 'many' → 'have tested positive.'"],
[3,"Grammar","Read this sentence: 'Walking quickly to the nurses station, the alarm suddenly began sounding throughout the unit.' What error does this contain?",["A spelling error","A run-on sentence","A dangling modifier — 'walking quickly' seems to describe the alarm","A comma splice"],2,"The participial phrase 'walking quickly to the nurses station' grammatically modifies 'the alarm,' but an alarm can't walk. The intended subject (a nurse) is missing from the sentence."],
[3,"Grammar","A charge nurse writes in an email: 'Between you and I, the new scheduling system has created more problems than it solved.' What is the grammatical error?",["'Between' should be 'among'","'I' should be 'me' because 'between' is a preposition requiring an object pronoun","There is no error","'Solved' should be 'has solved'"],1,"Prepositions (between, for, to, with) take object pronouns. 'Between you and me' is correct."],
[3,"Grammar","Which sentence correctly uses 'who' vs. 'whom'?",["The patient who the nurse discharged was readmitted within 24 hours.","The nurse whom reported the incident was praised for her diligence.","The physician to whom the referral was sent specializes in oncology.","The technician whom ran the lab tests found an abnormality."],2,"'To whom the referral was sent' — 'whom' is the object of the preposition 'to.' In choices A and D, 'who' should replace 'whom' (subjects of their clauses). Choice B has 'whom' as a subject, which is wrong."],
[3,"Grammar","A student writes: 'The patient, along with her two daughters, were waiting in the exam room for over an hour.' The correction should be:",["Change 'were' to 'was' because the subject is 'patient' (singular)","Change 'were' to 'have been'","Remove the commas around 'along with her two daughters'","No correction needed"],0,"'Along with her two daughters' is a parenthetical phrase — it doesn't change the singular subject 'patient.' The verb must agree with 'patient' → 'was waiting.'"],
[3,"Grammar","Identify the sentence with a misplaced modifier:",["The nurse carefully documented the patient's vital signs in the chart.","After completing the assessment, the care plan was updated by the nurse.","The physician prescribed antibiotics for the patient with a sinus infection.","The lab results were reviewed thoroughly before the patient was discharged."],1,"'After completing the assessment' implies the care plan completed the assessment. Should be: 'After completing the assessment, the nurse updated the care plan.'"],
[3,"Sentence Structure","A student writes: 'Because the patient's blood pressure continued to drop despite IV fluid resuscitation.' Their professor marks this as an error because:",["It contains a spelling mistake","It is a dependent clause without an independent clause — a fragment","It is a run-on sentence","The medical terminology is incorrect"],1,"'Because' makes this a subordinate/dependent clause. It needs an independent clause to be a complete sentence (e.g., 'Because the BP dropped, the physician ordered vasopressors.')."],
[3,"Sentence Structure","Read the following: 'The patient was admitted with chest pain, the cardiologist ordered an emergency catheterization, the procedure revealed a 90% blockage in the left anterior descending artery.' This sentence is problematic because:",["It contains incorrect medical information","It is a comma splice — three independent clauses joined only by commas","It is too long","It uses passive voice"],1,"Three independent clauses separated only by commas = comma splice (a type of run-on). Fix with semicolons, periods, or conjunctions."],
[3,"Sentence Structure","Which revision correctly fixes this run-on sentence: 'The nurse administered the medication the patient reported immediate relief of symptoms'?",["The nurse administered the medication, the patient reported immediate relief.","The nurse administered the medication; the patient reported immediate relief of symptoms.","The nurse administered the medication the patient reported relief.","The nurse administered, the medication the patient reported relief."],1,"A semicolon correctly joins two independent clauses. Option A is still a comma splice. Options C and D are worse than the original."],
[3,"Sentence Structure","Identify the compound-complex sentence:",["The nurse checked vital signs and documented them.","After the physician reviewed the labs, she adjusted the medication, and the pharmacist verified the new order.","The patient was discharged in stable condition.","Because the wound was healing, the dressing changes were reduced."],1,"Dependent clause ('After the physician reviewed the labs') + two independent clauses joined by 'and' = compound-complex."],
[3,"Sentence Structure","A student writes: 'Although the patient initially presented with mild symptoms. She was later transferred to the ICU when her condition deteriorated rapidly.' The error is:",["A comma splice","Incorrect verb tense","The first sentence is a fragment — a dependent clause punctuated as a complete sentence","No error — this is correct"],2,"'Although the patient initially presented...' is a dependent clause (begins with 'although') that cannot stand alone. It should be connected to the second sentence with a comma, not separated by a period."],
[3,"Punctuation","Read: 'The patients vital signs were stable throughout the night and no interventions were necessary.' This sentence is missing:",["A period","A possessive apostrophe in 'patient's' and a comma before 'and'","A semicolon","An exclamation point"],1,"'Patients' needs an apostrophe to show possession (patient's vital signs), and a comma is needed before 'and' when joining two independent clauses."],
[3,"Punctuation","Which sentence demonstrates CORRECT use of quotation marks and punctuation?",["The nurse said \"take your medication with food\".","The nurse said, \"Take your medication with food.\"","The nurse said, \"Take your medication with food\".","The nurse said \"Take your medication with food.\""],1,"Comma after dialogue tag, capital letter to start the quote, period inside closing quotation marks (American English standard)."],
[3,"Punctuation","In the sentence 'Dr. Johnsons patient who had been admitted on Tuesday was scheduled for surgery on Friday,' which correction is needed?",["Add a comma after 'patient'","Change 'Johnsons' to 'Johnson's' (possessive) and add commas around 'who had been admitted on Tuesday'","No correction needed","Remove 'who had been admitted on Tuesday'"],1,"Johnson's needs a possessive apostrophe, and the relative clause 'who had been admitted on Tuesday' is nonessential (doesn't change which patient) so it needs commas."],
[3,"Spelling","Read the following clinical note: 'The patient was perscribed 500mg of amoxicillin for a respiratoy infection. She reported no alergies to antibiotics and tolerated previous courses without complications.' How many spelling errors does this note contain?",["1","2","3","4"],2,"Three errors: 'perscribed' → prescribed, 'respiratoy' → respiratory, 'alergies' → allergies."],
[3,"Spelling","Which sentence contains a correctly spelled medical term?",["The patient was diagnosed with neopathy of the peripheral nerves.","The physician ordered a cumplete blood count and metabolic panel.","The nurse documented that the patient exhibited tachycardia with a heart rate of 112.","The wound showed signs of inflamation including redness and swelling."],2,"Tachycardia is correct. Errors: neopathy → neuropathy, cumplete → complete, inflamation → inflammation."],
[3,"Spelling","A nursing student writes: 'The occurance of nosocomial infections has been decresing since the new hygene protocol was implemented.' How many words are misspelled?",["1","2","3","4"],2,"Three: 'occurance' → occurrence, 'decresing' → decreasing, 'hygene' → hygiene."],
[3,"Vocabulary","A patient's chart reads: 'Patient is oriented to person and place but not to time. She is lethargic but arousable, with intermittent periods of lucidity.' In this context, 'lucidity' most likely means:",["Confusion and disorientation","Periods of clear, coherent thinking","Deep unconsciousness","Extreme agitation"],1,"The passage contrasts lucidity with the patient's otherwise altered state — it comes in 'intermittent periods' and is set against lethargy, suggesting moments of clarity."],
[3,"Vocabulary","A physician documents: 'The patient's dysphagia has progressed to the point where she can no longer safely tolerate thin liquids, and aspiration precautions have been initiated.' Based on context, 'dysphagia' refers to:",["Difficulty breathing","Difficulty swallowing","Difficulty speaking","Difficulty walking"],1,"Can't tolerate thin liquids + aspiration risk = swallowing problem. Dys=difficult, phagia=swallowing/eating."],
[3,"Vocabulary","The discharge summary states: 'The patient demonstrated marked improvement in ambulation following physical therapy. At admission, she was unable to transfer independently; at discharge, she ambulated 200 feet with a rolling walker with standby assistance only.' 'Ambulation' in this context means:",["Breathing independently","Walking or moving about","Eating without assistance","Speaking clearly"],1,"The progression from unable to transfer → walking 200 feet makes the meaning clear from context. All clues point to mobility/walking."],
[3,"Vocabulary","A nurse reads the following order: 'NPO after midnight. Pre-operative labs to include CBC, CMP, PT/INR, and type and screen. Administer prophylactic cefazolin 2g IV within 60 minutes of incision.' Based on context, 'prophylactic' in this order means:",["Given after infection develops","Given to treat existing symptoms","Given to prevent potential infection before it occurs","Given only in emergency situations"],2,"The antibiotic is ordered BEFORE surgery (pre-operative), within 60 min of incision = preventive, not treatment of existing infection."],
[3,"Vocabulary","The neurologist's note states: 'MRI reveals a 2.3 cm mass in the right temporal lobe. The lesion appears well-circumscribed with no evidence of invasion into surrounding tissue, and there is no associated edema or midline shift. These characteristics are more consistent with a benign rather than malignant process.' In this context, 'malignant' most likely means:",["Non-threatening and slow-growing","Cancerous, aggressive, and potentially life-threatening","Caused by infection","Related to the immune system"],1,"The passage contrasts malignant with benign and mentions invasion potential — malignant describes dangerous, cancerous growths as opposed to harmless ones."],
[3,"Word Parts","A physician writes that a patient has 'hepatomegaly.' Knowing that 'hepato-' refers to the liver and '-megaly' means enlargement, this term indicates:",["Liver failure","Liver infection","Enlarged liver","Liver cancer"],2,"Hepato (liver) + megaly (enlargement) = enlarged liver. The word parts define the condition without indicating cause (could be infection, cancer, heart failure, etc.)."],
[3,"Word Parts","A patient is scheduled for a 'cholecystectomy.' Based on the word parts — 'chole-' (bile/gallbladder), 'cyst-' (bladder/sac), '-ectomy' (surgical removal) — this procedure involves:",["Removal of the appendix","Removal of the gallbladder","Removal of a kidney stone","Removal of the thyroid gland"],1,"Chole (bile) + cyst (sac/bladder) + ectomy (removal) = gallbladder removal."],
[3,"Word Parts","A nurse documents that a patient is experiencing 'oliguria.' The prefix 'oligo-' means 'few or scanty' and '-uria' refers to 'urine condition.' This patient is most likely producing:",["Excessive amounts of urine","Abnormally small amounts of urine","Blood-tinged urine","Foul-smelling urine"],1,"Oligo (scanty/few) + uria (urine) = reduced urine output. Compare: polyuria (poly=many → excessive urine), hematuria (hemat=blood → blood in urine)."],
[3,"Word Parts","The medical record states the patient has 'bilateral pneumothorax.' Breaking this down: 'bi-' (two), 'lateral' (side), 'pneumo-' (air/lung), 'thorax' (chest). This means:",["Air in the chest cavity on one side only","Air in the chest cavity on both sides","Fluid in both lungs","Infection in both lungs"],1,"Bi (two) + lateral (sides) + pneumo (air) + thorax (chest) = air in the chest cavity affecting both sides."],
[3,"Word Parts","A physician orders labs to evaluate for 'hyperthyroidism.' Based on word parts — 'hyper-' (excessive/above normal), 'thyroid' (thyroid gland), '-ism' (condition) — this condition involves:",["An underactive thyroid gland","An overactive thyroid gland producing excess hormones","Thyroid cancer","Surgical removal of the thyroid"],1,"Hyper (above/excessive) + thyroid + ism (condition) = overactive thyroid. Compare: hypothyroidism (hypo=under → underactive)."],
[3,"Audience Awareness","A nurse needs to explain a new diabetes medication to an elderly patient with an 8th-grade reading level. Which explanation is MOST appropriate?",["This thiazolidinedione acts as an insulin sensitizer, enhancing peripheral glucose uptake via PPAR-gamma receptor agonism.","Take this pill once a day with breakfast. It helps your body use insulin better to keep your blood sugar from getting too high.","This medication modulates glycemic control through enhanced insulin sensitivity at the cellular receptor level.","Take the TZD with food QD for glycemic optimization."],1,"Clear, simple language with concrete instructions. Avoids jargon, abbreviations, and overly technical explanations while still being accurate and respectful."],
[3,"Audience Awareness","A nurse is writing an incident report about a patient fall. Which documentation is MOST appropriate?",["The patient fell and hit his head really hard. It was super scary and everyone was worried.","Patient found on floor beside bed at 0345. Bed alarm was not activated. Patient alert and oriented, denies loss of consciousness. Laceration to right forehead approximately 2 cm. Physician notified at 0350.","I think the patient probably tried to go to the bathroom and fell because the bed alarm wasn't on, which is someone's fault.","Patient fell. Hit head. Doctor called."],1,"Objective, factual, includes specific time, details, assessment findings, and follow-up actions. No opinions, assumptions, or casual language."],
[3,"Audience Awareness","A public health department is creating a flyer about flu vaccination for distribution at community centers. Which approach is MOST effective for a general audience?",["Influenza immunization confers protection through the stimulation of antibody-mediated immunity targeting hemagglutinin surface proteins.","GET YOUR FLU SHOT!!!! DON'T BE STUPID!!!!","The flu shot helps your body fight the flu before you get sick. It's safe, free at most pharmacies, and takes less than 5 minutes. Protect yourself and your family this season.","Annual influenza vaccination is recommended by the Advisory Committee on Immunization Practices for all individuals aged ≥6 months."],2,"Accessible language, practical information (where, how long, cost), emotional appeal (protect your family), and respectful tone. Not too technical, not condescending."],
[3,"Paragraph Organization","Read this paragraph: '(1) Hand hygiene is the single most effective measure to prevent healthcare-associated infections. (2) Alcohol-based hand rubs are effective against most common pathogens. (3) Despite this evidence, compliance rates among healthcare workers average only 40% globally. (4) Multifaceted interventions including education, reminders, and feedback have shown the most promise in improving compliance.' If the paragraph were reorganized, which sentence serves as the TOPIC sentence?",["Sentence 1","Sentence 2","Sentence 3","Sentence 4"],0,"Sentence 1 presents the main claim that the rest of the paragraph supports with details about effectiveness (S2), the problem (S3), and solutions (S4)."],
[3,"Paragraph Organization","A student writes: 'The patient's blood pressure was elevated. Additionally, her cholesterol levels were within normal limits. Moreover, she reported experiencing frequent headaches over the past two weeks. The physician decided to adjust her antihypertensive medication.' Which sentence disrupts the logical flow of this paragraph?",["Sentence 1","Sentence 2","Sentence 3","Sentence 4"],1,"The paragraph focuses on hypertension: elevated BP → headaches (a symptom of high BP) → medication adjustment. Normal cholesterol is unrelated and disrupts the logical progression."],
[3,"Paragraph Organization","Which transition word or phrase BEST connects these two sentences: 'The initial antibiotic was ineffective against the patient's infection. ___, the physician switched to a broader-spectrum antibiotic.'",["Furthermore","In contrast","Consequently","Similarly"],2,"The ineffectiveness of the first antibiotic led to (caused) the switch. 'Consequently' shows cause→effect. 'Furthermore' and 'Similarly' suggest addition, not result. 'In contrast' implies opposition."],
[3,"Writing Process","A nursing student's essay has strong evidence and solid arguments, but paragraphs appear in a confusing order, the introduction doesn't clearly state a thesis, and transitions between sections are abrupt. These issues should be addressed during which stage?",["Prewriting","Drafting","Revising","Editing/proofreading"],2,"Organization, thesis clarity, and transitions are structural/content issues = revising. Editing addresses grammar, spelling, and punctuation at the surface level."],
[3,"Writing Process","A student submits a paper with the following sentence: 'The patient's labratory results was reviewed by the attending physician, who than ordered additional test's.' This sentence contains errors that should be caught during:",["Prewriting","Drafting","Revising","Editing/proofreading"],3,"Spelling (labratory→laboratory, than→then), subject-verb agreement (results was→results were), and apostrophe misuse (test's→tests) are all surface-level mechanics = editing/proofreading."],
[3,"Active & Passive Voice","A nursing instructor asks students to rewrite this passive sentence in active voice: 'The patient's blood pressure was measured by the nursing student every four hours.' Which revision is correct?",["Blood pressure measurement was performed every four hours.","Every four hours, blood pressure was being measured.","The nursing student measured the patient's blood pressure every four hours.","Measuring blood pressure every four hours was done."],2,"Active voice: subject (nursing student) performs the action (measured) on the object (blood pressure). All other options remain passive or awkward."],
[3,"Active & Passive Voice","In clinical documentation, which sentence uses ACTIVE voice?",["The medication was administered by the nurse at 0800.","The incision was examined by the surgeon during morning rounds.","The respiratory therapist adjusted the ventilator settings at 1400.","The lab specimens were collected by the phlebotomist before breakfast."],2,"Subject (respiratory therapist) performs the action (adjusted). All other sentences have the subject receiving the action ('was administered by,' 'was examined by,' 'were collected by')."],
[3,"Active & Passive Voice","A professor comments that a student's paper overuses passive voice. Which of the following sentences should the student revise?",["The research team analyzed data from 500 participants.","The hospital implemented a new fall prevention protocol.","Significant improvement was observed in the treatment group over the 12-week period.","The nurse educated the patient about wound care before discharge."],2,"'Significant improvement was observed' is passive — who observed it? Should be: 'The researchers observed significant improvement...' The other sentences all use active voice with clear subjects performing actions."],

[1,"Fill in Blank","A pharmacy technician labels a solution concentration as 103%. Express this percentage as a decimal equivalent. (Use a leading zero if applicable. Do not use trailing zeros.)",null,["1.03"],"Step 1: Write 103% as a fraction over 100 → 103/100.\nStep 2: Divide 103 ÷ 100 = 1.03.\nAnswer: 1.03||TRAP||Common mistake: moving the decimal only one place instead of two, giving 10.3 instead of 1.03.",2],
[1,"Fill in Blank","A nurse is calculating a weight-based medication dose for a patient who weighs 154 lbs. Convert the patient's weight to kilograms. Round to the nearest whole number. (1 kg = 2.2 lbs)",null,["70"],"Step 1: Set up the conversion: 154 lbs ÷ 2.2 lbs/kg.\nStep 2: 154 ÷ 2.2 = 70 kg.\nAnswer: 70||TRAP||Common mistake: multiplying 154 × 2.2 = 338.8 instead of dividing — that converts kg to lbs, not lbs to kg.",2],
[1,"Fill in Blank","A nurse uses the formula 5x - 8 = 27 to calculate the number of tablets (x) needed for a patient's dose. Solve for x. x = ___",null,["7"],"Step 1: Add 8 to both sides → 5x = 27 + 8 = 35.\nStep 2: Divide both sides by 5 → x = 35 ÷ 5 = 7.\nAnswer: 7||TRAP||Common mistake: subtracting 8 instead of adding it, giving 5x = 19 and x = 3.8.",2],
[1,"Fill in Blank","A medication order calls for 3/8 of a tablet. Convert 3/8 to a decimal so the dose can be verified. Do not use trailing zeros.",null,["0.375"],"Step 1: Divide the numerator by the denominator → 3 ÷ 8.\nStep 2: 3 ÷ 8 = 0.375.\nAnswer: 0.375||TRAP||Common mistake: dividing 8 ÷ 3 = 2.667 instead of 3 ÷ 8, flipping the numerator and denominator.",2],
[1,"Fill in Blank","A provider orders 1.5 grams of amoxicillin for a patient. The pharmacy stocks 500 mg tablets. Before calculating the number of tablets, the nurse must first convert the ordered dose. How many milligrams is 1.5 grams? ___ mg",null,["1500","1,500"],"Step 1: Recall that 1 gram = 1000 milligrams.\nStep 2: Multiply 1.5 × 1000 = 1500 mg.\nAnswer: 1500||TRAP||Common mistake: dividing by 1000 instead of multiplying, giving 0.0015 mg — that converts in the wrong direction.",2],
[1,"Fill in Blank","A clinical study reports that 40% of 250 patients in a trial experienced symptom improvement. How many patients experienced improvement? ___",null,["100"],"Step 1: Convert 40% to a decimal → 0.40.\nStep 2: Multiply 0.40 × 250 = 100 patients.\nAnswer: 100||TRAP||Common mistake: dividing 250 ÷ 40 = 6.25 instead of multiplying, confusing the percentage operation.",2],
[1,"Fill in Blank","A triage nurse records a patient's temperature as 38.5°C using a digital thermometer. The facility requires documentation in Fahrenheit. Convert this temperature to °F. Round to one decimal place. (F = C × 9/5 + 32)",null,["101.3"],"Step 1: Multiply 38.5 × 9/5 = 38.5 × 1.8 = 69.3.\nStep 2: Add 32 → 69.3 + 32 = 101.3°F.\nAnswer: 101.3||TRAP||Common mistake: forgetting to add 32, giving 69.3°F — or using the reverse formula (F - 32) × 5/9 which converts Fahrenheit to Celsius.",2],
[1,"Fill in Blank","A provider orders digoxin 0.25 mg by mouth daily. The available tablets are labeled in micrograms (mcg). Convert the ordered dose to micrograms. ___ mcg",null,["250"],"Step 1: Recall that 1 mg = 1000 mcg.\nStep 2: Multiply 0.25 × 1000 = 250 mcg.\nAnswer: 250||TRAP||Common mistake: dividing 0.25 ÷ 1000 = 0.00025 mcg — this converts in the wrong direction (mg to grams logic).",2],
[1,"Fill in Blank","A provider orders 250 mL of 0.9% Normal Saline to infuse over 4 hours via an IV pump. The nurse must program the pump rate. What is the infusion rate in mL/hr? ___",null,["62.5"],"Step 1: Use the formula: Rate = Volume ÷ Time.\nStep 2: 250 mL ÷ 4 hours = 62.5 mL/hr.\nAnswer: 62.5||TRAP||Common mistake: multiplying 250 × 4 = 1000 instead of dividing, or rounding 62.5 to 63 when the question does not ask you to round.",2],
[1,"Fill in Blank","A nurse tracks a patient's daily fluid intake (in ounces) over five days: 12, 18, 22, 25, 31. What is the median fluid intake? ___",null,["22"],"Step 1: Arrange the values in order (already sorted): 12, 18, 22, 25, 31.\nStep 2: With 5 values (odd count), the median is the middle value — the 3rd number.\nAnswer: 22||TRAP||Common mistake: calculating the mean (average) instead of the median — (12+18+22+25+31) ÷ 5 = 21.6, which is not the median.",2],
[2,"Fill in Blank","How many chromosomes are in a human gamete (sperm or egg cell)? ___",null,["23"],"Gametes are haploid (n = 23). Somatic cells are diploid (2n = 46).",2],
[2,"Fill in Blank","In the equation 2H₂ + O₂ → 2H₂O, the coefficient for oxygen is ___.",null,["1"],"O₂ has an implied coefficient of 1.",2],
[2,"Fill in Blank","Normal blood pH range is 7.35 to ___.",null,["7.45"],"Normal arterial blood pH: 7.35 - 7.45.",2],

[2,"Ordered Response","Place the steps of the scientific method in the correct order:",["Form a hypothesis","Analyze results and draw conclusions","Make an observation and ask a question","Design and conduct an experiment"],[2,0,3,1],"Observe → Hypothesize → Experiment → Analyze. The scientific method starts with observation, not hypothesis.",3],
[2,"Ordered Response","Arrange the levels of biological organization from SMALLEST to LARGEST:",["Organ","Tissue","Cell","Organ system"],[2,1,0,3],"Cell → Tissue → Organ → Organ system.",3],

// Parse structured explanation strings
function parseExpl(expl){
if(!expl||expl.indexOf("||")===-1) return{steps:expl||"",trap:"",wrongs:{}};
const parts={steps:"",trap:"",wrongs:{}};let cur="steps";
const segs=expl.split("||");
for(let i=0;i<segs.length;i++){
const s=segs[i].trim();
if(s==="TRAP"){cur="trap";continue;}
const wm=s.match(/^WRONG_([A-Z])$/);
if(wm){cur="wrong_"+wm[1];continue;}
if(cur==="steps") parts.steps+=(parts.steps?" ":"")+s;
else if(cur==="trap") parts.trap+=(parts.trap?" ":"")+s;
else if(cur.startsWith("wrong_")) {const k=cur.slice(6);parts.wrongs[k]=(parts.wrongs[k]||"")+s;}
}
return parts;
}

// Render rich two-sided feedback
function renderFeedback(q,correct,ua){
const ex=parseExpl(q.explanation);
const col=correct?"#4FCF7F":"#F76F6F";
const headerBg=correct?"#4FCF7F22":"#F76F6F22";
const icon=correct?"\u2713":"\u2717";
const label=correct?"CORRECT":"INCORRECT";

// Build "you selected / correct answer" section
const selParts=[];
if(q.qtype==="mc"){
if(!correct){
const letter=String.fromCharCode(65+(typeof ua==="number"?ua:0));
selParts.push(h("div",{style:{fontSize:12,color:"#F76F6F",marginBottom:6,fontWeight:600}},"You selected "+letter+": "+q.options[ua]));
const wk=ex.wrongs[letter];
if(wk) selParts.push(h("div",{style:{fontSize:12,color:"#ccc",marginBottom:8,paddingLeft:8,borderLeft:"2px solid #F76F6F44"}},wk));
const cl=String.fromCharCode(65+q.correctIndex);
selParts.push(h("div",{style:{fontSize:12,color:"#4FCF7F",marginBottom:8,fontWeight:600}},"Correct answer: "+cl+": "+q.options[q.correctIndex]));
}else{
const cl=String.fromCharCode(65+q.correctIndex);
selParts.push(h("div",{style:{fontSize:12,color:"#4FCF7F",marginBottom:8,fontWeight:600}},cl+": "+q.options[q.correctIndex]+" is correct."));
}
}else if(q.qtype==="sata"){
if(!correct&&Array.isArray(ua)&&Array.isArray(q.correctIndex)){
const missed=q.correctIndex.filter(i=>!ua.includes(i));
const extra=ua.filter(i=>!q.correctIndex.includes(i));
if(missed.length>0) selParts.push(h("div",{style:{fontSize:12,color:"#F76F6F",marginBottom:4}},"Missed: "+missed.map(i=>q.options[i]).join("; ")));
if(extra.length>0) selParts.push(h("div",{style:{fontSize:12,color:"#F76F6F",marginBottom:4}},"Incorrectly selected: "+extra.map(i=>q.options[i]).join("; ")));
selParts.push(h("div",{style:{fontSize:12,color:"#4FCF7F",marginBottom:8,fontWeight:600}},"Correct selections: "+q.correctIndex.map(i=>q.options[i]).join("; ")));
}
}else if(q.qtype==="fill"){
if(!correct){
selParts.push(h("div",{style:{fontSize:12,color:"#F76F6F",marginBottom:4}},"You entered: "+ua));
const ca=Array.isArray(q.correctIndex)?q.correctIndex[0]:q.correctIndex;
selParts.push(h("div",{style:{fontSize:12,color:"#4FCF7F",marginBottom:8,fontWeight:600}},"Correct answer: "+ca));
}
}else if(q.qtype==="order"){
if(!correct&&Array.isArray(ua)){
selParts.push(h("div",{style:{fontSize:12,color:"#F76F6F",marginBottom:4}},"Your order: "+ua.map((idx,i)=>(i+1)+". "+q.options[idx]).join(" \u2192 ")));
}
}

// Step-by-step explanation with \n → line breaks
const stepsEls=ex.steps?ex.steps.split("\n").map((line,i)=>h("div",{key:"s"+i,style:{marginBottom:2}},line)):[];

// Trap callout
const trapEl=ex.trap?h("div",{style:{backgroundColor:"#F7A94F15",border:"1px solid #F7A94F44",borderRadius:6,padding:"7px 10px",marginTop:8,fontSize:11,lineHeight:1.6,color:"#F7A94F"}},"\u26A0\uFE0F Common mistake: "+ex.trap):null;

// Wrong-answer breakdown for correct answers (show traps others fall for)
const wrongSummary=[];
if(correct&&Object.keys(ex.wrongs).length>0){
Object.entries(ex.wrongs).forEach(([letter,reason])=>{
wrongSummary.push(h("div",{key:"w"+letter,style:{fontSize:11,color:"#999",marginBottom:2}},letter+": "+reason));
});
}

return h("div",{style:{borderRadius:8,border:"1px solid "+col+"44",overflow:"hidden",marginTop:9}},
h("div",{style:{backgroundColor:headerBg,padding:"6px 11px",display:"flex",alignItems:"center",gap:6}},
h("span",{style:{fontSize:16,fontWeight:700,color:col}},icon),
h("span",{style:{fontSize:13,fontWeight:700,color:col,letterSpacing:".5px"}},label)),
h("div",{style:{padding:"9px 11px",backgroundColor:"#1a1a1e"}},
...selParts,
stepsEls.length>0&&h("div",{style:{fontSize:12,lineHeight:1.7,color:"#bbb",marginBottom:4}},...stepsEls),
wrongSummary.length>0&&h("div",{style:{marginTop:6,paddingTop:6,borderTop:"1px solid #333"}},
h("div",{style:{fontSize:10,fontWeight:700,color:"#888",marginBottom:4,textTransform:"uppercase"}},"Why other options are wrong:"),
...wrongSummary),
trapEl));
}
