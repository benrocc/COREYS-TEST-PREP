[1,"Ratios & Tables","A clinic tracked patient visits over one week and recorded the following: Monday had 45 patients, Tuesday had 30 patients, Wednesday had 60 patients, Thursday had 40 patients, and Friday had 50 patients. What is the ratio of Wednesday\u2019s patients to Monday\u2019s patients, expressed in simplified form?",["4:3","3:2","2:1","60:45"],0,"Step 1: Write the ratio of Wednesday to Monday.\nWednesday : Monday = 60 : 45\n\nStep 2: Find the greatest common factor (GCF) of 60 and 45.\nFactors of 60: 1, 2, 3, 4, 5, 6, 10, 12, 15, 20, 30, 60\nFactors of 45: 1, 3, 5, 9, 15, 45\nGCF = 15\n\nStep 3: Divide both sides by 15.\n60 ÷ 15 = 4\n45 ÷ 15 = 3\nSimplified ratio = 4:3||TRAP||Forgetting to simplify the ratio, or dividing by the wrong common factor||WRONG_B||3:2 would result from dividing 60:45 by 20 and 15 separately, which is not a consistent simplification||WRONG_C||2:1 would mean Wednesday had exactly twice Monday\u2019s count (90:45 or 60:30), which does not match 60:45||WRONG_D||60:45 is the unsimplified ratio; the question specifically asks for the simplified form"],
[1,"Ratios & Tables","A pharmacy reference table shows the following dosage guidelines: 50 mg for a 25 kg patient, 100 mg for a 50 kg patient, and 150 mg for a 75 kg patient. Based on this proportional relationship, what dose should be administered to a patient weighing 60 kg?",["110mg","120mg","125mg","130mg"],1,"Step 1: Determine the dosage rate from the table.\n50 mg ÷ 25 kg = 2 mg/kg\n100 mg ÷ 50 kg = 2 mg/kg\n150 mg ÷ 75 kg = 2 mg/kg\nThe rate is constant at 2 mg per kg.\n\nStep 2: Calculate the dose for 60 kg.\n60 kg × 2 mg/kg = 120 mg||TRAP||Estimating or interpolating incorrectly instead of identifying the constant rate of 2 mg/kg||WRONG_A||110 mg would result from an incorrect interpolation between 100 mg and 150 mg that does not follow the linear relationship||WRONG_C||125 mg would come from averaging 100 mg and 150 mg (the midpoint), ignoring the actual proportional rate||WRONG_D||130 mg results from a miscalculated interpolation, perhaps adding 30 mg to 100 mg based on a faulty proportion"],
[1,"Ratios & Tables","A nursing program had an enrollment of 800 students in 2022 and 920 students in 2023. What was the percent increase in enrollment from 2022 to 2023?",["12%","15%","18%","20%"],1,"Step 1: Find the amount of increase.\n920 - 800 = 120 students\n\nStep 2: Divide the increase by the original amount.\n120 ÷ 800 = 0.15\n\nStep 3: Convert to a percentage.\n0.15 × 100 = 15%||TRAP||Dividing by the new value (920) instead of the original value (800), or making arithmetic errors in the division||WRONG_A||12% would result from dividing 120 by approximately 1,000 or another rounding error||WRONG_C||18% could come from misreading the numbers or using an incorrect base value in the calculation||WRONG_D||20% would result from dividing 120 by 600, using the wrong denominator entirely"],
[1,"Multi-Step Problems","A nurse starts a 1,000 mL IV bag running at a rate of 125 mL per hour at 0800 (8:00 AM). At what time will the IV bag need to be replaced?",["1200","1400","1600","1800"],2,"Step 1: Calculate how long the IV bag will last.\n1,000 mL ÷ 125 mL/hr = 8 hours\n\nStep 2: Add 8 hours to the start time.\n0800 + 8 hours = 1600 (4:00 PM)||TRAP||Dividing incorrectly or making errors when adding hours to military time||WRONG_A||1200 would mean only 4 hours of infusion time, as if the rate were 250 mL/hr instead of 125 mL/hr||WRONG_B||1400 would mean 6 hours of infusion time, which does not result from 1,000 ÷ 125||WRONG_D||1800 would mean 10 hours of infusion time, possibly from dividing 1,000 by 100 instead of 125"],
[1,"Multi-Step Problems","A patient is prescribed 2.5 mL of liquid medication to be taken 3 times per day for 14 days. How many total milliliters of medication are needed to complete the full course of treatment?",["42","52.5","75","105"],3,"Step 1: Calculate the daily dose.\n2.5 mL × 3 doses/day = 7.5 mL per day\n\nStep 2: Calculate the total for 14 days.\n7.5 mL/day × 14 days = 105 mL||TRAP||Multiplying only two of the three values together instead of completing both steps||WRONG_A||42 mL could result from multiplying 14 × 3 = 42, forgetting to include the 2.5 mL dose entirely||WRONG_B||52.5 mL comes from multiplying 2.5 × 14 = 35 and then adding a miscalculated extra, or from 7.5 × 7||WRONG_C||75 mL results from multiplying 2.5 × 30, perhaps confusing the number of days or total doses"],
[1,"Multi-Step Problems","A medication is dosed at 5 mg per kilogram of body weight. If a patient weighs 176 pounds and 1 kilogram equals 2.2 pounds, what is the correct dose for this patient?",["350mg","400mg","440mg","500mg"],1,"Step 1: Convert pounds to kilograms.\n176 lbs ÷ 2.2 lbs/kg = 80 kg\n\nStep 2: Calculate the dose.\n80 kg × 5 mg/kg = 400 mg||TRAP||Multiplying pounds by 2.2 instead of dividing, or making errors in the unit conversion||WRONG_A||350 mg could result from rounding 176 ÷ 2.2 down to 70 kg and then multiplying by 5||WRONG_C||440 mg would come from dividing 176 by 2 instead of 2.2, getting 88 kg, then 88 × 5 = 440||WRONG_D||500 mg could result from dividing 176 by 1.76 to get 100 kg, then 100 × 5 = 500"],
[1,"Multi-Step Problems","Using the dosage formula (Desired ÷ Have) × Quantity, a physician orders 250 mg of a medication. The pharmacy has the medication available in 500 mg per 10 mL. How many milliliters should the nurse administer?",["2.5mL","5mL","10mL","25mL"],1,"Step 1: Set up the formula.\n(Desired ÷ Have) × Quantity = (250 mg ÷ 500 mg) × 10 mL\n\nStep 2: Divide desired by have.\n250 ÷ 500 = 0.5\n\nStep 3: Multiply by the quantity.\n0.5 × 10 mL = 5 mL||TRAP||Inverting the fraction (dividing Have by Desired) or ignoring the quantity multiplier||WRONG_A||2.5 mL would result from dividing 250 by 500 and then multiplying by 5 instead of 10, or another arithmetic error||WRONG_C||10 mL is the full quantity available, which would only be correct if the desired dose equaled the have dose (500 mg)||WRONG_D||25 mL could result from multiplying 250 ÷ 100 × 10, using an incorrect denominator"],
[1,"Statistics","A nurse recorded the following patient temperatures in degrees Fahrenheit over seven shifts: 98.2, 99.1, 101.3, 98.6, 100.4, 99.8, and 102.1. What is the median temperature?",["99.1","99.8","100.4","101.3"],1,"Step 1: Arrange the values in ascending order.\n98.2, 98.6, 99.1, 99.8, 100.4, 101.3, 102.1\n\nStep 2: Find the middle value. With 7 values, the median is the 4th value.\nPosition: 1st=98.2, 2nd=98.6, 3rd=99.1, 4th=99.8, 5th=100.4, 6th=101.3, 7th=102.1\nMedian = 99.8||TRAP||Picking the middle value from the unsorted list, or miscounting the position in the ordered list||WRONG_A||99.1 is the 3rd value in the ordered set, one position before the true median||WRONG_C||100.4 is the 5th value in the ordered set, one position after the true median||WRONG_D||101.3 is the 6th value, which is not the middle of a 7-value data set"],
[1,"Statistics","Using the same temperature data from the previous question (98.2, 99.1, 101.3, 98.6, 100.4, 99.8, 102.1), what is the range of the data set?",["2.9","3.1","3.9","4.1"],2,"Step 1: Identify the maximum and minimum values.\nMaximum = 102.1\nMinimum = 98.2\n\nStep 2: Calculate the range.\nRange = Maximum - Minimum = 102.1 - 98.2 = 3.9||TRAP||Subtracting incorrect values or making a decimal subtraction error||WRONG_A||2.9 could come from subtracting 99.2 from 102.1, using the wrong minimum value||WRONG_B||3.1 might result from subtracting 99.0 from 102.1 or another arithmetic slip||WRONG_D||4.1 could result from subtracting 98.0 from 102.1, rounding the minimum down incorrectly"],
[1,"Statistics","A set of patient satisfaction scores contains the values 72, 85, 85, 90, 93, 68, and 85. If the score of 68 is removed from the data set, does the median change?",["No, stays 85","Yes, increases to 87.5","Yes, decreases","Cannot determine"],0,"Step 1: Find the median of the original 7 values.\nOrdered: 68, 72, 85, 85, 85, 90, 93\nMiddle (4th of 7) = 85\n\nStep 2: Remove 68 and find the median of the remaining 6 values.\nOrdered: 72, 85, 85, 85, 90, 93\nMiddle = average of 3rd and 4th values = (85 + 85) ÷ 2 = 85\n\nStep 3: Compare.\nBoth medians = 85. The median does not change.||TRAP||Assuming that removing any value must change the median, or averaging the wrong pair of middle values||WRONG_B||87.5 would result from averaging 85 and 90 (the 3rd and 4th values if miscounted), but the correct middle pair is both 85||WRONG_C||The median does not decrease because the removed value (68) is below the median and does not shift the central values||WRONG_D||The median can be determined from both data sets; there is enough information to answer the question"],
[1,"Statistics","A data set has a range of 40 and a minimum value of 15. What is the maximum value in the data set?",["25","40","55","60"],2,"Step 1: Recall the range formula.\nRange = Maximum - Minimum\n\nStep 2: Substitute the known values and solve.\n40 = Maximum - 15\nMaximum = 40 + 15\nMaximum = 55||TRAP||Subtracting instead of adding, or confusing which value is the range versus the minimum||WRONG_A||25 comes from subtracting 15 from 40, reversing the operation needed to solve for the maximum||WRONG_B||40 is the range itself, not the maximum value||WRONG_D||60 could result from adding 40 + 20, using an incorrect minimum value"],
[1,"Geometry","A nurse is measuring a circular wound that has a radius of 3 cm. What is the area of the wound? (Use π = 3.14)",["9.42cm²","18.84cm²","28.26cm²","56.52cm²"],2,"Step 1: Recall the area formula for a circle.\nA = πr²\n\nStep 2: Substitute the values.\nA = 3.14 × (3)²\nA = 3.14 × 9\nA = 28.26 cm²||TRAP||Using the diameter formula instead of the radius formula, or forgetting to square the radius||WRONG_A||9.42 cm² results from calculating π × 3 = 9.42, which is the formula for circumference divided by something, not area||WRONG_B||18.84 cm² comes from calculating 2 × π × 3 = 18.84, which is the circumference, not the area||WRONG_D||56.52 cm² results from using 2πr² or doubling the correct area, applying an incorrect formula"],
[1,"Geometry","A medical storage box has dimensions of 30 cm long, 20 cm wide, and 15 cm tall. What is the volume of the box in cubic centimeters?",["650cm³","900cm³","6,000cm³","9,000cm³"],3,"Step 1: Recall the volume formula for a rectangular prism.\nV = length × width × height\n\nStep 2: Substitute the values.\nV = 30 × 20 × 15\n\nStep 3: Calculate.\n30 × 20 = 600\n600 × 15 = 9,000 cm³||TRAP||Adding the dimensions instead of multiplying, or only multiplying two of the three dimensions||WRONG_A||650 cm³ could result from adding 30 + 20 + 15 = 65 and then multiplying by 10, a completely incorrect approach||WRONG_B||900 cm³ comes from multiplying only two dimensions, such as 30 × 15 = 450 and doubling, or another partial calculation||WRONG_C||6,000 cm³ results from multiplying 30 × 20 = 600 and then multiplying by 10 instead of 15"],
[1,"Geometry","A triangular bandage has a base of 40 cm and a height of 25 cm. What is the area of the bandage?",["500cm²","650cm²","1,000cm²","1,250cm²"],0,"Step 1: Recall the area formula for a triangle.\nA = ½ × base × height\n\nStep 2: Substitute the values.\nA = ½ × 40 × 25\n\nStep 3: Calculate.\n40 × 25 = 1,000\n1,000 × ½ = 500 cm²||TRAP||Forgetting to multiply by ½, which gives the area of a rectangle instead of a triangle||WRONG_B||650 cm² does not result from any standard geometric formula applied to these dimensions||WRONG_C||1,000 cm² comes from calculating base × height without the ½ factor, which gives a rectangle's area||WRONG_D||1,250 cm² could result from calculating 50 × 25 or another error with the dimensions"],
[1,"Geometry","A nurse measures a patient's upper arm circumference as 31.4 cm. Using the formula C = πd, what is the diameter of the arm? (Use π ≈ 3.14)",["5cm","10cm","15cm","20cm"],1,"Step 1: Recall the circumference formula.\nC = π × d\n\nStep 2: Solve for diameter.\nd = C ÷ π\nd = 31.4 ÷ 3.14\nd = 10 cm||TRAP||Confusing diameter with radius, or multiplying instead of dividing||WRONG_A||5 cm is the radius (half the diameter), not the diameter itself; this results from an extra division by 2||WRONG_C||15 cm could result from a division error or estimating 31.4 ÷ 2 instead of 31.4 ÷ 3.14||WRONG_D||20 cm would come from dividing 31.4 by approximately 1.57 (π/2), confusing the radius and diameter formulas"],
[1,"Fractions","A patient drinks 2/3 of a 12-ounce juice at breakfast and 3/4 of a 12-ounce juice at lunch. What is the total amount of juice the patient consumed?",["14oz","15oz","17oz","18oz"],2,"Step 1: Calculate the amount consumed at breakfast.\n2/3 × 12 = 24/3 = 8 oz\n\nStep 2: Calculate the amount consumed at lunch.\n3/4 × 12 = 36/4 = 9 oz\n\nStep 3: Add the two amounts.\n8 + 9 = 17 oz||TRAP||Adding the fractions 2/3 + 3/4 first and then multiplying by 12, which can lead to arithmetic errors, or miscalculating one of the fraction multiplications||WRONG_A||14 oz could result from calculating 2/3 × 12 = 8 and 1/2 × 12 = 6, using the wrong fraction for lunch||WRONG_B||15 oz might come from calculating 3/4 × 12 = 9 and then adding only 6 instead of 8 for breakfast||WRONG_D||18 oz would mean the patient drank both full 12-oz servings minus some amount, or results from adding 2/3 + 3/4 incorrectly as 3/2 and then multiplying"],
[1,"Fractions","A laboratory procedure requires 3/4 cup of Solution A for every 1/2 cup of Solution B. What is the ratio of Solution A to Solution B in simplified form?",["3:2","4:3","6:4","3:4"],0,"Step 1: Write the ratio as a fraction division.\nSolution A : Solution B = 3/4 ÷ 1/2\n\nStep 2: Divide fractions by multiplying by the reciprocal.\n3/4 × 2/1 = 6/4 = 3/2\n\nStep 3: Express as a ratio.\n3/2 = 3:2||TRAP||Writing the fractions directly as a ratio without dividing (3:4 or 4:2), or inverting the division||WRONG_B||4:3 could result from comparing the denominators (4 and 2) and numerators (3 and 1) incorrectly||WRONG_C||6:4 is the unsimplified form of the correct ratio; while equivalent, it is not fully reduced||WRONG_D||3:4 results from simply comparing the numerator of the first fraction to the denominator, without performing the division"],
[1,"Percentages","A hospital unit's infection rate decreased from 8% to 5%. What is the relative percent decrease in the infection rate?",["3%","37.5%","62.5%","60%"],1,"Step 1: Find the absolute decrease.\n8% - 5% = 3 percentage points\n\nStep 2: Calculate the relative percent decrease.\n(Decrease ÷ Original) × 100 = (3 ÷ 8) × 100\n= 0.375 × 100\n= 37.5%||TRAP||Confusing absolute decrease (3 percentage points) with relative percent decrease, or dividing by the new value instead of the original||WRONG_A||3% is the absolute decrease in percentage points, not the relative percent decrease||WRONG_C||62.5% would result from calculating 5 ÷ 8 × 100, which gives the remaining percentage rather than the decrease||WRONG_D||60% could come from calculating (8 - 5) ÷ 5 × 100 = 60%, dividing by the new rate instead of the original rate"],
[1,"Percentages","A medical supply originally costs $80. It is marked 20% off, and then an additional 10% discount is applied to the sale price. What is the final price?",["$56","$57.60","$60","$64"],1,"Step 1: Apply the first discount of 20%.\n$80 × 0.80 = $64\n\nStep 2: Apply the second discount of 10% to the sale price.\n$64 × 0.90 = $57.60\n\nNote: Sequential discounts of 20% and 10% do NOT equal a single 30% discount.||TRAP||Adding the two discounts together as 30% and applying once, which gives a different (incorrect) answer||WRONG_A||$56 comes from applying a single 30% discount: $80 × 0.70 = $56, incorrectly combining the two discounts||WRONG_C||$60 could result from subtracting $20 from $80 and then incorrectly taking 10% of the original price instead of the sale price||WRONG_D||$64 is the price after only the first 20% discount; this ignores the second 10% discount entirely"],
[1,"Algebra","A nurse has 500 mL of a 10% saline solution and needs to dilute it to a 4% concentration. Using the dilution formula C₁V₁ = C₂V₂, what must the final total volume be?",["1,000mL","1,250mL","1,500mL","2,000mL"],1,"Step 1: Write the dilution equation.\nC₁ × V₁ = C₂ × V₂\n10 × 500 = 4 × V₂\n\nStep 2: Solve for V₂.\n5,000 = 4 × V₂\nV₂ = 5,000 ÷ 4\nV₂ = 1,250 mL||TRAP||Dividing by the wrong concentration, or confusing the volume of solvent to add with the total final volume||WRONG_A||1,000 mL would result from dividing 5,000 by 5 instead of 4, using an incorrect concentration||WRONG_C||1,500 mL could come from a miscalculation such as dividing 5,000 by 3.33 or another arithmetic error||WRONG_D||2,000 mL would result from dividing 5,000 by 2.5, perhaps confusing the concentration percentages"],
[1,"Conversions","A patient's temperature is recorded as 39.5°C. Using the formula F = C × 9/5 + 32, what is the patient's temperature in degrees Fahrenheit?",["101.1°F","102.5°F","103.1°F","104.2°F"],2,"Step 1: Multiply the Celsius temperature by 9/5.\n39.5 × 9/5 = 39.5 × 1.8 = 71.1\n\nStep 2: Add 32.\n71.1 + 32 = 103.1°F||TRAP||Forgetting to add 32, or using an incorrect conversion factor such as 5/9 instead of 9/5||WRONG_A||101.1°F could result from multiplying 39.5 × 1.75 instead of 1.8, then adding 32 (69.125 + 32 = 101.1)||WRONG_B||102.5°F might come from a rounding error in the multiplication step, such as 39.5 × 1.785 + 32||WRONG_D||104.2°F could result from using 40 instead of 39.5 in the calculation: 40 × 1.8 + 32 = 104"],
[1,"Conversions","A physician orders a dose of 0.5 grams of a medication. The pharmacy stocks the medication in 125 mg tablets. How many tablets should the nurse administer?",["2","3","4","5"],2,"Step 1: Convert grams to milligrams.\n0.5 g × 1,000 mg/g = 500 mg\n\nStep 2: Divide by the tablet strength.\n500 mg ÷ 125 mg/tablet = 4 tablets||TRAP||Forgetting to convert grams to milligrams, or making a division error with 500 ÷ 125||WRONG_A||2 tablets would deliver only 250 mg (0.25 g), which is half the prescribed dose||WRONG_B||3 tablets would deliver 375 mg, which does not equal the ordered 500 mg||WRONG_D||5 tablets would deliver 625 mg, which exceeds the prescribed dose of 500 mg"],
[1,"Inequalities","A nurse needs to determine the number of units (x) required so that the total preparation satisfies the condition 2x + 5 > 11. What values of x satisfy this inequality?",["x>3","x>8","x<3","x>6"],0,"Step 1: Subtract 5 from both sides.\n2x + 5 > 11\n2x > 11 - 5\n2x > 6\n\nStep 2: Divide both sides by 2.\nx > 6 ÷ 2\nx > 3||TRAP||Forgetting to divide by 2 in the final step, or flipping the inequality sign when there is no negative division||WRONG_B||x > 8 could result from subtracting 5 from 11 to get 6 and then adding 2 instead of dividing by 2, getting 8||WRONG_C||x < 3 has the correct boundary value but the wrong direction for the inequality sign||WRONG_D||x > 6 results from forgetting the final division step, leaving the answer as 2x > 6 and dropping the coefficient"],
[1,"Comparing Numbers","Arrange the following values from least to greatest: 0.5, 1/3, 0.75, 2/3.",["0.5, 1/3, 0.75, 2/3","1/3, 0.5, 2/3, 0.75","0.75, 2/3, 0.5, 1/3","2/3, 1/3, 0.75, 0.5"],1,"Step 1: Convert all values to decimals for comparison.\n0.5 = 0.50\n1/3 ≈ 0.333\n0.75 = 0.75\n2/3 ≈ 0.667\n\nStep 2: Arrange from least to greatest.\n0.333 < 0.50 < 0.667 < 0.75\n1/3, 0.5, 2/3, 0.75||TRAP||Not converting fractions to decimals before comparing, or confusing the relative size of 2/3 and 0.75||WRONG_A||This order places 0.5 before 1/3, but 1/3 (0.333) is smaller than 0.5||WRONG_C||This is the reverse order (greatest to least), not least to greatest as requested||WRONG_D||This order is neither ascending nor descending; it randomly places the values"],
[1,"Statistics","A nurse is reviewing patient data and needs to identify which statistical measures describe the center of a data set. Select ALL measures of central tendency from the following options.",["Mean","Range","Median","Standard deviation","Mode"],[0,2,4],"Step-by-step explanation:\n1. Central tendency measures describe the CENTER or typical value of a data set.\n2. Mean = the arithmetic average of all values.\n3. Median = the middle value when data is arranged in order.\n4. Mode = the most frequently occurring value.\n5. Range = the difference between the highest and lowest values (a measure of SPREAD, not center).\n6. Standard deviation = how far values deviate from the mean on average (a measure of SPREAD, not center).\n7. Therefore, Mean, Median, and Mode are the three measures of central tendency.||TRAP||Selecting Range or Standard Deviation is the most common mistake. Students confuse measures of spread (how data is distributed) with measures of center (where data clusters). Range tells you the span; SD tells you variability — neither describes a typical value.",1],
[1,"Dosage Calculation","A pediatric patient weighs 44 pounds. The physician has ordered a medication at 10 mg/kg/day, to be divided into 2 equal doses. Using the conversion 1 kg = 2.2 lbs, how many milligrams should each dose contain?",["100mg","200mg","44mg","440mg"],0,"Step-by-step explanation:\n1. Convert pounds to kilograms: 44 lbs ÷ 2.2 lbs/kg = 20 kg\n2. Calculate the total daily dose: 20 kg × 10 mg/kg/day = 200 mg/day\n3. Divide into 2 equal doses: 200 mg ÷ 2 = 100 mg per dose\n4. Each dose = 100 mg||TRAP||Forgetting to divide by 2 doses gives 200 mg (option B). Using 44 directly without converting to kg gives 440 mg (option D). Using 44 as the answer confuses weight with dose (option C).||WRONG_B||200 mg is the total daily dose, not the individual dose. You must divide by 2 because the order specifies 2 doses per day.||WRONG_C||44 mg confuses the patient's weight in pounds with the dose amount. The weight must first be converted to kg, then multiplied by the dose rate.||WRONG_D||440 mg results from multiplying 44 lbs × 10 mg without converting pounds to kilograms first. You must convert to kg before calculating."],
[1,"Dosage Calculation","A nurse is administering a 500 mL intravenous infusion at a rate of 75 mL per hour. How long will it take for the entire infusion to be completed?",["5hrs","5hrs 40min","6hrs","6hrs 40min"],3,"Step-by-step explanation:\n1. Total volume = 500 mL\n2. Rate = 75 mL/hr\n3. Time = Volume ÷ Rate = 500 mL ÷ 75 mL/hr = 6.667 hours\n4. Convert the decimal to minutes: 0.667 × 60 = 40 minutes\n5. Total time = 6 hours and 40 minutes||TRAP||Rounding 6.667 down to 6 hours ignores the remaining 40 minutes (option C). Dividing incorrectly as 500÷100=5 gives 5 hours (option A). Getting 5 hrs 40 min results from a subtraction error (option B).||WRONG_A||5 hours would require a rate of 100 mL/hr (500 ÷ 100 = 5). At 75 mL/hr, the infusion takes longer than 5 hours.||WRONG_B||5 hours 40 minutes does not result from any correct division of 500 by 75. This is a distractor that combines two wrong values.||WRONG_C||6 hours would deliver only 450 mL (75 × 6 = 450), leaving 50 mL still to infuse. The remaining 50 mL takes an additional 40 minutes."],
[1,"Dosage Calculation","A provider orders 0.5 grams of a medication. The pharmacy supplies tablets that each contain 250 mg. How many tablets should the nurse administer?",["1","2","3","4"],1,"Step-by-step explanation:\n1. Convert grams to milligrams: 0.5 g × 1,000 mg/g = 500 mg\n2. Determine number of tablets: 500 mg ÷ 250 mg/tablet = 2 tablets\n3. The nurse should administer 2 tablets||TRAP||Forgetting to convert grams to milligrams and thinking 0.5 is less than 250 leads to choosing 1 tablet (option A). Miscalculating the conversion as 0.5 g = 250 mg also leads to 1 tablet.||WRONG_A||1 tablet provides only 250 mg, which is half the ordered dose of 500 mg. The order is for 0.5 g, not 0.25 g.||WRONG_C||3 tablets would deliver 750 mg, which exceeds the ordered 500 mg dose by 250 mg.||WRONG_D||4 tablets would deliver 1,000 mg (1 g), which is double the ordered dose of 0.5 g."],
[1,"Dosage Calculation","A patient weighing 70 kg is prescribed a continuous heparin infusion at 18 units/kg/hour. What is the correct infusion rate in units per hour?",["1,080u/hr","1,260u/hr","1,800u/hr","700u/hr"],1,"Step-by-step explanation:\n1. Dose rate = 18 units/kg/hr\n2. Patient weight = 70 kg\n3. Infusion rate = 18 units/kg/hr × 70 kg = 1,260 units/hr||TRAP||Multiplying 18 × 60 instead of 18 × 70 gives 1,080 (option A). Using a round number like 100 instead of 70 or confusing 18 × 100 = 1,800 (option C). Dividing 70 by something or just using 700 as a rough estimate (option D).||WRONG_A||1,080 units/hr would be correct only if the patient weighed 60 kg (18 × 60 = 1,080). The patient weighs 70 kg, not 60 kg.||WRONG_C||1,800 units/hr would require a patient weight of 100 kg (18 × 100 = 1,800). This overestimates the dose for a 70 kg patient.||WRONG_D||700 units/hr ignores the 18 units/kg/hr rate entirely. Simply using the patient's weight as the rate is incorrect."],
[1,"Multi-Step Problems","A nurse works three 12-hour shifts per week at a base rate of $34.50 per hour. Overtime is paid at 1.5 times the base rate for any hours worked beyond 36 hours in a week. This week, the nurse worked a total of 40 hours. What is the nurse's gross pay for the week?",["$1,380","$1,449","$1,242","$1,381"],1,"Step-by-step explanation:\n1. Regular hours = 36 hours (3 shifts × 12 hours)\n2. Regular pay = 36 × $34.50 = $1,242.00\n3. Overtime hours = 40 − 36 = 4 hours\n4. Overtime rate = $34.50 × 1.5 = $51.75/hr\n5. Overtime pay = 4 × $51.75 = $207.00\n6. Gross pay = $1,242.00 + $207.00 = $1,449.00||TRAP||Multiplying all 40 hours by the base rate gives $1,380 (option A), ignoring overtime. Using only regular pay gives $1,242 (option C). Adding $1 rounding error gives $1,381 (option D).||WRONG_A||$1,380 results from 40 × $34.50, which incorrectly pays all hours at the base rate without applying the 1.5× overtime multiplier for hours beyond 36.||WRONG_C||$1,242 is only the regular pay for 36 hours. This ignores the 4 overtime hours entirely.||WRONG_D||$1,381 is not the result of any correct calculation. It may stem from a rounding error or arithmetic mistake during the overtime calculation."],
[1,"Multi-Step Problems","A nurse needs to administer 1,800 mL of IV fluid over 12 hours using tubing with a drip factor of 15 drops per mL. What is the correct drip rate in drops per minute?",["22.5","37.5","150","18.75"],1,"Step-by-step explanation:\n1. Calculate mL per hour: 1,800 mL ÷ 12 hours = 150 mL/hr\n2. Calculate mL per minute: 150 mL/hr ÷ 60 min/hr = 2.5 mL/min\n3. Calculate drops per minute: 2.5 mL/min × 15 drops/mL = 37.5 drops/min||TRAP||Dividing 1800 by 12 and stopping at 150 mL/hr without converting to drops/min (option C). Forgetting to multiply by the drip factor or dividing by it instead gives wrong values. Using 80 instead of 60 minutes gives 18.75 (option D).||WRONG_A||22.5 drops/min results from a calculation error, such as using an incorrect drip factor or dividing where you should multiply.||WRONG_C||150 is the mL/hr rate, not the drip rate. You must convert mL/hr to mL/min and then multiply by the drip factor to get drops/min.||WRONG_D||18.75 results from an error such as dividing by 80 instead of 60, or misapplying the drip factor in the formula."],
[1,"Percentages","A hospital reports that its 30-day readmission rate decreased from 18% to 13.5%. What is the percent decrease in the readmission rate?",["4.5%","25%","75%","33%"],1,"Step-by-step explanation:\n1. Find the amount of change: 18% − 13.5% = 4.5 percentage points\n2. Percent decrease = (change ÷ original) × 100\n3. Percent decrease = (4.5 ÷ 18) × 100 = 25%\n4. The readmission rate decreased by 25%\nNote: 4.5% is the absolute point decrease, not the percent decrease.||TRAP||Choosing 4.5% (option A) confuses the absolute point decrease with the percent decrease. You must divide the change by the original value. Choosing 75% (option C) calculates what remains instead of what decreased. Choosing 33% (option D) divides by 13.5 instead of 18.||WRONG_A||4.5% is the raw difference in percentage points (18 − 13.5 = 4.5), not the percent decrease. Percent decrease requires dividing the change by the original value.||WRONG_C||75% represents the proportion of the original rate that remains (13.5 ÷ 18 = 0.75), which is the complement of the decrease, not the decrease itself.||WRONG_D||33% would result from dividing the change by the new value (4.5 ÷ 13.5 = 0.33) instead of dividing by the original value of 18%."],
[1,"Percentages","A clinical trial reports that a new medication is 80% effective. If the medication is administered to a group of 350 patients, how many patients are expected to respond positively to the treatment?",["240","270","280","300"],2,"Step-by-step explanation:\n1. Effectiveness rate = 80% = 0.80\n2. Total patients = 350\n3. Expected responders = 350 × 0.80 = 280 patients||TRAP||Using 0.70 instead of 0.80 gives 245, close to 240 (option A). Using a rough estimate of 0.77 gives ~270 (option B). Using 0.857 or rounding up gives 300 (option D).||WRONG_A||240 would mean a 68.6% effectiveness rate (240 ÷ 350 = 0.686), not the stated 80%.||WRONG_B||270 would correspond to a 77.1% effectiveness rate (270 ÷ 350 = 0.771), which does not match the 80% stated.||WRONG_D||300 would correspond to an 85.7% effectiveness rate (300 ÷ 350 = 0.857), which exceeds the stated 80%."],
[1,"Percentages","A nursing program received 320 applications for the upcoming cohort and accepted 64 students. What is the acceptance rate for this program?",["5%","15%","20%","25%"],2,"Step-by-step explanation:\n1. Number accepted = 64\n2. Total applicants = 320\n3. Acceptance rate = (64 ÷ 320) × 100 = 20%||TRAP||Dividing 320 by 64 gives 5 and confusing this with 5% (option A). Using a rough mental estimate can lead to 15% or 25% (options B and D).||WRONG_A||5% of 320 is only 16 students, not 64. This error may come from inverting the division (320 ÷ 64 = 5) and misinterpreting the quotient as a percentage.||WRONG_B||15% of 320 is 48 students, not 64. This is a distractor that does not match any correct calculation.||WRONG_D||25% of 320 is 80 students, not 64. This overestimates the acceptance rate."],
[1,"Fractions","A nurse needs to document a medication dose of 2.5 mL in fractional form on the patient's chart. What is 2.5 mL expressed as a fraction?",["2¼","2½","2¾","2⅓"],1,"Step-by-step explanation:\n1. Separate the whole number: 2.5 = 2 + 0.5\n2. Convert the decimal to a fraction: 0.5 = 1/2\n3. Combine: 2 + 1/2 = 2½\n4. Therefore, 2.5 mL = 2½ mL||TRAP||Confusing 0.5 with 1/4 gives 2¼ (option A). Confusing 0.5 with 3/4 gives 2¾ (option C). Confusing 0.5 with 1/3 gives 2⅓ (option D).||WRONG_A||2¼ equals 2.25, not 2.5. One-quarter (0.25) is half of one-half (0.5).||WRONG_C||2¾ equals 2.75, not 2.5. Three-quarters (0.75) is greater than one-half (0.5).||WRONG_D||2⅓ equals approximately 2.333, not 2.5. One-third (0.333...) is not equal to one-half (0.5)."],
[1,"Fractions","A patient is receiving a 500 mL IV infusion. After a routine check, the nurse determines that 3/5 of the total volume has already been administered. How many milliliters remain to be infused?",["100","200","300","400"],1,"Step-by-step explanation:\n1. Total volume = 500 mL\n2. Fraction administered = 3/5\n3. Volume administered = 3/5 × 500 = 300 mL\n4. Volume remaining = 500 − 300 = 200 mL\nAlternatively: Fraction remaining = 1 − 3/5 = 2/5\n2/5 × 500 = 200 mL||TRAP||Answering 300 mL (option C) gives how much was given, not how much remains. Answering 100 mL (option A) may result from calculating 1/5 × 500. Answering 400 mL (option D) may result from calculating 4/5 × 500.||WRONG_A||100 mL is 1/5 of 500 mL. The remaining fraction is 2/5, not 1/5.||WRONG_C||300 mL is the amount already administered (3/5 × 500). The question asks for the amount remaining, not the amount given.||WRONG_D||400 mL is 4/5 of 500 mL. The remaining fraction is 2/5, not 4/5."],
[1,"Fractions","A nurse is preparing a therapeutic oral solution that requires 2/3 cup of one ingredient and 3/4 cup of another ingredient. What is the total amount of the combined ingredients?",["5/7","5/12","17/12","1 5/12"],2,"Step-by-step explanation:\n1. Find the least common denominator (LCD) of 3 and 4: LCD = 12\n2. Convert 2/3 to twelfths: 2/3 × 4/4 = 8/12\n3. Convert 3/4 to twelfths: 3/4 × 3/3 = 9/12\n4. Add the fractions: 8/12 + 9/12 = 17/12\n5. As a mixed number: 17/12 = 1 5/12||TRAP||Adding numerators and denominators directly gives 5/7 (option A: 2+3=5, 3+4=7). Adding only the numerators with the wrong LCD gives 5/12 (option B). Option D (1 5/12) is equivalent to 17/12 but the correct answer is the improper fraction form.||WRONG_A||5/7 results from the common error of adding fractions by adding numerators (2+3=5) and denominators (3+4=7) separately. You must find a common denominator first.||WRONG_B||5/12 incorrectly adds only the numerators (2+3=5) while using 12 as the denominator, without properly converting each fraction to equivalent twelfths.||WRONG_D||1 5/12 is mathematically equivalent to 17/12, but when the answer choices list both forms, the improper fraction 17/12 is the standard representation requested."],
[1,"Algebra","A patient's weight decreased from 210 pounds to 195 pounds over a 5-week period. What was the patient's average weekly weight loss?",["2lbs/wk","3lbs/wk","5lbs/wk","15lbs/wk"],1,"Step-by-step explanation:\n1. Total weight loss = 210 − 195 = 15 pounds\n2. Time period = 5 weeks\n3. Average weekly loss = 15 ÷ 5 = 3 lbs/wk||TRAP||Dividing 15 by a wrong number like 7.5 gives 2 lbs/wk (option A). Dividing 15 by 3 instead of 5 gives 5 lbs/wk (option C). Forgetting to divide entirely and reporting the total loss gives 15 lbs/wk (option D).||WRONG_A||2 lbs/wk would mean only 10 lbs lost over 5 weeks (2 × 5 = 10), but the patient lost 15 lbs.||WRONG_C||5 lbs/wk would mean 25 lbs lost over 5 weeks (5 × 5 = 25), but the patient lost only 15 lbs.||WRONG_D||15 lbs/wk is the total weight loss over the entire 5-week period, not the weekly average. You must divide by the number of weeks."],
[1,"Algebra","Solve the following equation for x: 4(x + 2) − 3 = 2x + 13",["x=4","x=6","x=3","x=2"],0,"Step-by-step explanation:\n1. Distribute: 4(x + 2) − 3 = 4x + 8 − 3 = 4x + 5\n2. Equation becomes: 4x + 5 = 2x + 13\n3. Subtract 2x from both sides: 2x + 5 = 13\n4. Subtract 5 from both sides: 2x = 8\n5. Divide both sides by 2: x = 4\n6. Check: 4(4+2) − 3 = 4(6) − 3 = 24 − 3 = 21; 2(4) + 13 = 8 + 13 = 21||TRAP||Failing to distribute the 4 to both terms inside the parentheses, or making sign errors during simplification, leads to incorrect values like x=6, x=3, or x=2.||WRONG_B||x=6: Substituting back, 4(6+2)−3 = 4(8)−3 = 29, but 2(6)+13 = 25. Since 29 does not equal 25, x=6 is incorrect.||WRONG_C||x=3: Substituting back, 4(3+2)−3 = 4(5)−3 = 17, but 2(3)+13 = 19. Since 17 does not equal 19, x=3 is incorrect.||WRONG_D||x=2: Substituting back, 4(2+2)−3 = 4(4)−3 = 13, but 2(2)+13 = 17. Since 13 does not equal 17, x=2 is incorrect."],
[1,"Algebra","The formula for Body Mass Index is BMI = weight (kg) divided by height (m) squared. A patient weighs 81 kg and is 1.8 meters tall. What is the patient's BMI?",["22.5","25.0","27.5","30.0"],1,"Step-by-step explanation:\n1. Weight = 81 kg\n2. Height = 1.8 m\n3. Height squared = 1.8 × 1.8 = 3.24 m squared\n4. BMI = 81 ÷ 3.24 = 25.0||TRAP||Forgetting to square the height and dividing 81 ÷ 1.8 = 45 leads nowhere, but using incorrect squaring like 1.8 squared = 3.6 gives 81 ÷ 3.6 = 22.5 (option A). Using 1.8 squared = 2.7 gives 30.0 (option D).||WRONG_A||22.5 results from dividing 81 by 3.6 instead of 3.24, which means the height was squared incorrectly (1.8 squared does not equal 3.6).||WRONG_C||27.5 does not result from any correct application of the BMI formula with these values. It reflects an arithmetic error.||WRONG_D||30.0 results from dividing 81 by 2.7, suggesting the height was squared as 1.8 squared = 2.7, which is incorrect."],
[1,"Geometry","A cylindrical specimen container has a radius of 5 cm and a height of 30 cm. Using the formula V = pi × r squared × h (where pi = 3.14), what is the volume of the container?",["471cm³","2,355cm³","4,710cm³","942cm³"],1,"Step-by-step explanation:\n1. Radius (r) = 5 cm\n2. Height (h) = 30 cm\n3. r squared = 5 × 5 = 25 cm squared\n4. V = pi × r squared × h = 3.14 × 25 × 30\n5. 3.14 × 25 = 78.5\n6. 78.5 × 30 = 2,355 cm cubed||TRAP||Using diameter (10) instead of radius (5) and getting 3.14 × 100 × 30 = 9,420, or halving that to 4,710 (option C). Forgetting to square the radius: 3.14 × 5 × 30 = 471 (option A). Using 2×pi×r instead of pi×r squared: 2 × 3.14 × 5 × 30 = 942 (option D).||WRONG_A||471 cm cubed results from not squaring the radius: 3.14 × 5 × 30 = 471. The formula requires r squared, not r.||WRONG_C||4,710 cm cubed results from using the diameter (10) instead of the radius (5): 3.14 × 100 × 30 = 9,420, then possibly halving it.||WRONG_D||942 cm cubed results from using the circumference formula (2×pi×r) instead of the area formula (pi×r squared): 2 × 3.14 × 5 × 30 = 942."],
[1,"Geometry","A nurse is measuring a wound that is 3 cm wide and 5 cm long. The wound dressing must extend 2 cm beyond all edges of the wound. What size dressing is needed?",["5×7cm","7×9cm","6×8cm","4×6cm"],1,"Step-by-step explanation:\n1. Wound dimensions: 3 cm × 5 cm\n2. Dressing extends 2 cm beyond ALL edges (both sides of each dimension)\n3. Width: 3 + 2 + 2 = 3 + 4 = 7 cm\n4. Length: 5 + 2 + 2 = 5 + 4 = 9 cm\n5. Dressing size = 7 × 9 cm||TRAP||Adding only 2 cm total (instead of 2 cm per side) gives 5×7 (option A). Adding 3 cm per side instead of 2 gives 9×11, not listed. Adding 1.5 cm per side gives 6×8 (option C). Adding 1 cm total gives 4×6 (option D).||WRONG_A||5×7 cm adds only 2 cm total to each dimension (3+2=5, 5+2=7) instead of adding 2 cm to EACH side. Since the dressing extends beyond all edges, you add 2 cm twice per dimension.||WRONG_C||6×8 cm adds only 1.5 cm per side (3+3=6, 5+3=8), which does not meet the 2 cm extension requirement.||WRONG_D||4×6 cm adds only 1 cm total per dimension, which is far less than the required 2 cm extension beyond all edges."],
[1,"Statistics","A nurse records the following six blood pressure readings for a patient throughout the day: 120, 138, 125, 142, 118, and 130 mmHg. What are the mean and median of these readings?",["Mean 128.8, Median 127.5","Mean 130, Median 130","Mean 128.8, Median 130","Mean 127.5, Median 128.8"],0,"Step-by-step explanation:\n1. Calculate the mean:\n   Sum = 120 + 138 + 125 + 142 + 118 + 130 = 773\n   Mean = 773 ÷ 6 = 128.833... ≈ 128.8\n2. Calculate the median:\n   Arrange in order: 118, 120, 125, 130, 138, 142\n   With 6 values (even count), median = average of 3rd and 4th values\n   Median = (125 + 130) ÷ 2 = 255 ÷ 2 = 127.5\n3. Mean = 128.8, Median = 127.5||TRAP||Using the middle value of the unordered list gives a wrong median. Rounding the mean to 130 and picking the wrong middle values gives option B. Pairing the correct mean with a wrong median of 130 gives option C. Swapping the mean and median values gives option D.||WRONG_B||Mean 130 incorrectly rounds 128.8 up, and Median 130 takes only one middle value instead of averaging the two middle values in an even-count data set.||WRONG_C||The mean of 128.8 is correct, but the median of 130 is wrong. With an even number of values, you must average the two middle values: (125+130)÷2 = 127.5.||WRONG_D||This swaps the mean and median values. The mean is 128.8 (not 127.5) and the median is 127.5 (not 128.8)."],
[1,"Statistics","A nursing instructor records the following exam scores for five students: 88, 72, 95, 88, and 91. The mode of this data set appears how many times?",["88 twice","91 once","95 once","72 once"],0,"Step-by-step explanation:\n1. List all scores: 88, 72, 95, 88, 91\n2. Count frequency of each value:\n   - 72 appears 1 time\n   - 88 appears 2 times\n   - 91 appears 1 time\n   - 95 appears 1 time\n3. The mode is the value that appears most frequently = 88\n4. 88 appears twice||TRAP||Confusing mode with median or mean. The mode is simply the most frequently occurring value, not the middle value or the average. Options B, C, and D list values that each appear only once — none of them is the mode.||WRONG_B||91 appears only once. A value that appears once cannot be the mode when another value (88) appears more frequently.||WRONG_C||95 appears only once. Although it is the highest score, frequency — not magnitude — determines the mode.||WRONG_D||72 appears only once. Although it is the lowest score, frequency — not position — determines the mode."],
[1,"Statistics","A healthcare provider records the following cholesterol levels for five patients: 180, 195, 210, 240, and 275 mg/dL. What are the range and median of this data set?",["95, 210","60, 195","95, 195","80, 210"],0,"Step-by-step explanation:\n1. Data is already in order: 180, 195, 210, 240, 275\n2. Range = highest − lowest = 275 − 180 = 95\n3. Median = middle value (3rd of 5 values) = 210\n4. Range = 95, Median = 210||TRAP||Subtracting adjacent values instead of the max and min gives a wrong range. Choosing the 2nd value instead of the 3rd as the median gives 195 (options B and C). Using 240−180=60 or another incorrect subtraction gives the wrong range (options B and D).||WRONG_B||Range of 60 is incorrect (no two values in the set differ by exactly 60 in a way that represents the full range). Median of 195 is the 2nd value, not the middle (3rd) value.||WRONG_C||Range of 95 is correct, but median of 195 picks the 2nd value instead of the 3rd value. In a set of 5 ordered values, the median is the 3rd value (210).||WRONG_D||Range of 80 does not result from subtracting the highest and lowest values (275−180=95, not 80). Median of 210 is correct but paired with the wrong range."],
[1,"Ratios & Tables","Ward A has 12 nurses caring for 48 patients. Ward B has 8 nurses caring for 40 patients. Which ward has the better nurse-to-patient ratio?",["Ward A (1:4)","Ward B (1:5)","Equal","Cannot tell"],0,"Step-by-step explanation:\n1. Ward A ratio: 12 nurses ÷ 48 patients = 1:4 (one nurse for every 4 patients)\n2. Ward B ratio: 8 nurses ÷ 40 patients = 1:5 (one nurse for every 5 patients)\n3. A lower number of patients per nurse means better coverage\n4. 1:4 is better than 1:5 because each nurse is responsible for fewer patients\n5. Ward A has the better ratio||TRAP||Thinking a higher second number (1:5) is better confuses the ratio direction. The lower the patients-per-nurse number, the better the staffing. Choosing Equal ignores the different ratios.||WRONG_B||Ward B has a 1:5 ratio, meaning each nurse cares for 5 patients. This is worse coverage than Ward A's 1:4 ratio.||WRONG_C||The ratios are not equal. Ward A is 1:4 while Ward B is 1:5. These are different ratios.||WRONG_D||The ratios can be determined from the given information by dividing nurses by patients for each ward."],
[1,"Ratios & Tables","A medication is supplied in a liquid concentration of 250 mg per 5 mL. A provider orders 400 mg of this medication. How many milliliters should the nurse administer?",["4","8","10","16"],1,"Step-by-step explanation:\n1. Concentration: 250 mg per 5 mL\n2. Find mg per mL: 250 mg ÷ 5 mL = 50 mg/mL\n3. Required dose: 400 mg\n4. Volume needed: 400 mg ÷ 50 mg/mL = 8 mL||TRAP||Dividing 400 by 100 instead of 50 gives 4 mL (option A). Using the 5 mL directly without calculating concentration gives 10 mL (option C). Multiplying or using an incorrect ratio gives 16 mL (option D).||WRONG_A||4 mL would deliver only 200 mg (4 × 50 = 200), which is half the ordered dose.||WRONG_C||10 mL would deliver 500 mg (10 × 50 = 500), which exceeds the ordered 400 mg dose.||WRONG_D||16 mL would deliver 800 mg (16 × 50 = 800), which is double the ordered dose."],
[1,"Conversions","A patient's temperature is recorded as 39.2 degrees Celsius. Using the formula F = (C × 9/5) + 32, what is this temperature in degrees Fahrenheit?",["100.6°F","102.2°F","102.6°F","104.0°F"],2,"Step-by-step explanation:\n1. Formula: F = (C × 9/5) + 32\n2. Multiply: 39.2 × 9/5 = 39.2 × 1.8 = 70.56\n3. Add 32: 70.56 + 32 = 102.56\n4. Round to one decimal: 102.56 ≈ 102.6°F||TRAP||Using 1.5 instead of 1.8 as the multiplier gives a wrong result. Rounding 70.56 to 70.2 before adding 32 gives 102.2 (option B). Truncating to 70 + 32 = 102 then adjusting wrong gives 100.6 (option A). Using 40°C conversion gives 104°F (option D).||WRONG_A||100.6°F would correspond to approximately 38.1°C, not 39.2°C. This results from a multiplication or rounding error in the conversion formula.||WRONG_B||102.2°F results from rounding 70.56 down to 70.2 before adding 32, or from a slight arithmetic error in the multiplication step.||WRONG_D||104.0°F would correspond to 40°C, not 39.2°C. This overestimates the conversion result."],
[1,"Conversions","A patient receives 2,400 mL of IV fluid over a 24-hour period. What is the infusion rate in liters per hour?",["0.1","1.0","0.24","2.4"],0,"Step-by-step explanation:\n1. Convert mL to liters: 2,400 mL ÷ 1,000 = 2.4 L\n2. Calculate rate per hour: 2.4 L ÷ 24 hours = 0.1 L/hr\nAlternatively: 2,400 mL ÷ 24 hr = 100 mL/hr = 0.1 L/hr||TRAP||Forgetting to convert mL to L and answering 100 (not listed) or stopping at 2.4 L without dividing by hours (option D). Dividing 24 by 100 to get 0.24 (option C). Using 2.4 ÷ 2.4 = 1.0 by mistake (option B).||WRONG_B||1.0 L/hr would mean 24 liters in 24 hours, which is 24,000 mL — ten times the actual volume.||WRONG_C||0.24 L/hr does not result from any correct calculation. It may come from misplacing a decimal point.||WRONG_D||2.4 is the total volume in liters, not the hourly rate. You must divide by 24 hours to find the rate per hour."],
[1,"Order of Operations","A nurse is calculating a clinical value using the expression (120 − 80) ÷ (4 × 2) + 5. Following the correct order of operations, what is the result?",["10","15","25","45"],0,"Step-by-step explanation:\n1. Evaluate parentheses first:\n   (120 − 80) = 40\n   (4 × 2) = 8\n2. Perform division: 40 ÷ 8 = 5\n3. Perform addition: 5 + 5 = 10||TRAP||Adding before dividing: 40 ÷ (8+5) = 40 ÷ 13 gives a wrong result. Multiplying 5 × 5 = 25 instead of adding (option C). Doing 120 − 80 = 40 + 5 = 45 and ignoring the division (option D).||WRONG_B||15 results from an arithmetic error in applying the order of operations, possibly adding 5 before dividing or miscalculating the division step.||WRONG_C||25 results from multiplying 5 × 5 instead of adding 5 + 5 after the division step.||WRONG_D||45 results from ignoring the division step entirely: (120 − 80) + 5 = 45, skipping the ÷ (4 × 2) portion."],
[1,"Estimation","A nurse needs to perform a brief assessment on each of 32 patients, and each assessment takes approximately 4.5 minutes. Approximately how long will it take to assess all patients?",["~2hrs","~2.5hrs","~3hrs","~4hrs"],1,"Step-by-step explanation:\n1. Round for estimation: 32 ≈ 30, and 4.5 ≈ 5 minutes\n2. Estimated total: 30 × 5 = 150 minutes\n3. Convert to hours: 150 ÷ 60 = 2.5 hours\nExact calculation: 32 × 4.5 = 144 minutes = 2.4 hours ≈ 2.5 hours||TRAP||Rounding too aggressively to 30 × 4 = 120 min = 2 hrs (option A). Rounding up to 30 × 6 = 180 min = 3 hrs (option C). Overestimating as 40 × 6 = 240 min = 4 hrs (option D).||WRONG_A||~2 hours = 120 minutes. Even with estimation (30 × 4 = 120), this rounds both numbers down, underestimating the true value of 144 minutes.||WRONG_C||~3 hours = 180 minutes significantly overestimates the actual time of ~144 minutes. This would require roughly 5.6 minutes per patient.||WRONG_D||~4 hours = 240 minutes is far too high. This would require about 7.5 minutes per patient, nearly double the actual time."],
[1,"Estimation","A nurse is ordering supplies with the following costs: $3.89, $12.15, $7.92, and $24.50. What is the best estimate of the total cost?",["~$45","~$48","~$50","~$55"],1,"Step-by-step explanation:\n1. Round each price to the nearest dollar:\n   $3.89 ≈ $4\n   $12.15 ≈ $12\n   $7.92 ≈ $8\n   $24.50 ≈ $25 (or $24)\n2. Estimated sum: $4 + $12 + $8 + $25 = $49\n3. $49 is closest to ~$48\nExact total: $3.89 + $12.15 + $7.92 + $24.50 = $48.46||TRAP||Rounding all values down gives $3+$12+$7+$24 = $46, close to ~$45 (option A). Rounding all up gives $4+$13+$8+$25 = $50 (option C). Overestimating by rounding each up by $2-3 gives ~$55 (option D).||WRONG_A||~$45 underestimates the total. The exact sum is $48.46, so $45 is about $3.50 too low.||WRONG_C||~$50 slightly overestimates the total of $48.46. While close, $48 is nearer to the actual sum.||WRONG_D||~$55 significantly overestimates the total by about $6.50. This would require the items to cost more than they do."],
[1,"Inequalities","A provider indicates that a safe therapeutic dose of a medication is between 200 mg and 600 mg, inclusive (200 ≤ dose ≤ 600 mg). A patient receives a dose of 150 mg. How would this dose be classified?",["Within range","Below safe range","Above safe range","Toxic"],1,"Step-by-step explanation:\n1. Safe therapeutic range: 200 mg to 600 mg (inclusive)\n2. Patient's dose: 150 mg\n3. Compare: 150 < 200 (the lower bound of the safe range)\n4. Since 150 mg is below the minimum safe dose, the dose is subtherapeutic (below safe range)||TRAP||Seeing that 150 is a positive number and assuming it falls within range (option A). Confusing below with above (option C). Assuming any dose outside the range is toxic (option D), when below-range doses are subtherapeutic, not toxic.||WRONG_A||150 mg is not within the safe range because the lower limit is 200 mg, and 150 < 200.||WRONG_C||The dose is below the range, not above it. Above safe range would mean the dose exceeds 600 mg.||WRONG_D||Toxic typically refers to doses above the safe range, not below. A subtherapeutic dose is too low to be effective but is not considered toxic."],
[1,"Inequalities","Solve the inequality: −3x + 9 ≥ 18",["x≤-3","x≥-3","x≤3","x≥3"],0,"Step-by-step explanation:\n1. Start with: −3x + 9 ≥ 18\n2. Subtract 9 from both sides: −3x ≥ 9\n3. Divide both sides by −3: x ≤ −3\n   (Remember: dividing by a negative number REVERSES the inequality sign)\n4. Solution: x ≤ −3||TRAP||Forgetting to flip the inequality sign when dividing by a negative number gives x ≥ −3 (option B). Dividing 9 by 3 without the negative gives x ≤ 3 (option C). Making both errors gives x ≥ 3 (option D).||WRONG_B||x ≥ −3 results from forgetting to reverse the inequality sign when dividing by −3. This is the most common mistake with negative coefficient inequalities.||WRONG_C||x ≤ 3 results from ignoring the negative sign on the coefficient, treating −3x as 3x, and dividing correctly.||WRONG_D||x ≥ 3 results from both ignoring the negative sign and forgetting to flip the inequality — a double error."],
[1,"Comparing Numbers","A nurse needs to determine which of the following values is the greatest: 5/8, 0.6, 62%, or 3/5. Which value is the largest?",["5/8","0.6","62%","3/5"],0,"Step-by-step explanation:\n1. Convert all values to decimals for comparison:\n   5/8 = 0.625\n   0.6 = 0.600\n   62% = 0.620\n   3/5 = 0.600\n2. Compare: 0.625 > 0.620 > 0.600 = 0.600\n3. The greatest value is 5/8 (0.625)||TRAP||Thinking 62% is greatest because 62 looks like a bigger number (option C). Not realizing that 0.6 and 3/5 are the same value (options B and D). Confusing 5/8 with 5÷8 and getting a wrong decimal.||WRONG_B||0.6 equals 0.600, which is less than 5/8 (0.625). It is also equal to 3/5.||WRONG_C||62% equals 0.620, which is less than 5/8 (0.625) by 0.005.||WRONG_D||3/5 equals 0.600, which is the same as 0.6 and less than 5/8 (0.625)."],
[1,"Comparing Numbers","Arrange the following numbers from least to greatest: −2.5, −3, 0.1, −0.5, 1",["−3,−2.5,−0.5,0.1,1","−2.5,−3,−0.5,0.1,1","0.1,−0.5,1,−2.5,−3","1,0.1,−0.5,−2.5,−3"],0,"Step-by-step explanation:\n1. Identify the most negative number: −3 is the smallest (farthest left on the number line)\n2. Next: −2.5 is greater than −3\n3. Next: −0.5 is greater than −2.5\n4. Next: 0.1 is the smallest positive number\n5. Largest: 1\n6. Least to greatest: −3, −2.5, −0.5, 0.1, 1||TRAP||Thinking −2.5 is smaller than −3 because 2.5 < 3 in absolute value (option B). Ignoring negative signs and ordering by absolute value (options C and D). Option D arranges greatest to least instead of least to greatest.||WRONG_B||This places −2.5 before −3, incorrectly treating −2.5 as smaller. On the number line, −3 is farther left (smaller) than −2.5.||WRONG_C||This arrangement ignores the negative signs and does not follow any consistent ordering from least to greatest.||WRONG_D||This arranges the numbers from greatest to least (descending order), which is the reverse of what was asked."],
[1,"Decimals","A patient's potassium level is reported as 3.47 mEq/L. The normal lower limit for potassium is 3.5 mEq/L. How far below the normal lower limit is the patient's potassium level?",["0.03","0.3","0.13","1.03"],0,"Step-by-step explanation:\n1. Normal lower limit = 3.5 mEq/L\n2. Patient's level = 3.47 mEq/L\n3. Difference = 3.50 − 3.47 = 0.03 mEq/L\n4. The patient's potassium is 0.03 mEq/L below the normal lower limit||TRAP||Misaligning decimal places: 3.5 − 3.47 mistakenly computed as 0.3 (option B) by treating 3.5 as 3.50 but subtracting incorrectly. Computing 3.60 − 3.47 = 0.13 (option C) by using a wrong reference value. Adding instead of subtracting gives 1.03 (option D).||WRONG_B||0.3 is ten times the correct answer. This error comes from misaligning decimal places during subtraction (treating the difference as tenths instead of hundredths).||WRONG_C||0.13 does not result from subtracting 3.47 from 3.5. This may come from using an incorrect lower limit value of 3.60 instead of 3.50.||WRONG_D||1.03 is far too large. The two values (3.5 and 3.47) are very close together, so the difference must be a small decimal."],
[1,"Decimals","A pharmacist is calculating a dosage adjustment using the expression 0.25 × 1.6 × 100. What is the result?",["4","40","400","0.4"],1,"Step-by-step explanation:\n1. First multiply: 0.25 × 1.6\n   0.25 × 1.6 = 0.40\n2. Then multiply by 100:\n   0.40 × 100 = 40\n3. Final answer = 40||TRAP||Forgetting to multiply by 100 gives 0.4 (option D). Miscounting decimal places gives 4 (option A) or 400 (option C). Moving the decimal too many places when multiplying by 100 gives 400.||WRONG_A||4 results from a decimal place error, such as computing 0.25 × 1.6 = 0.04 (incorrect) and then multiplying by 100.||WRONG_C||400 results from moving the decimal point too far when multiplying by 100, or from computing 0.25 × 1.6 = 4.0 (incorrect) and then multiplying by 100.||WRONG_D||0.4 is the intermediate result of 0.25 × 1.6. This answer forgets the final step of multiplying by 100."],
